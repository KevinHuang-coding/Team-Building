<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kevin's Team Building</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231F4E79'/%3E%3Ctext x='32' y='44' font-size='32' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EK%3C/text%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  :root{
    --primary:#1F4E79; --primary-dark:#0F3454; --primary-light:#D9E2F3;
    --accent:#C00000; --green:#548235; --green-light:#E2EFDA;
    --yellow:#BF8F00; --yellow-light:#FFF2CC;
    --orange:#C65911; --orange-light:#FBE5D6;
    --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB;
    --gray-300:#D1D5DB; --gray-400:#9CA3AF; --gray-500:#6B7280;
    --gray-600:#4B5563; --gray-700:#374151; --gray-800:#1F2937;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
    --shadow:0 2px 6px rgba(0,0,0,.08);
    --shadow-lg:0 8px 24px rgba(0,0,0,.12);
    --radius:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-800);font-size:14px;line-height:1.55;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;}
  input,textarea,select{font-family:inherit;font-size:14px;}
  textarea{resize:vertical;min-height:60px;}
  .hidden{display:none!important;}

  /* ===== 全域載入 ===== */
  #globalLoading{position:fixed;inset:0;background:rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;z-index:1000;}
  #globalLoading.show{display:flex;}
  .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== Setup / Login 共用容器 ===== */
  .center-wrap{min-height:100vh;background:linear-gradient(135deg,#1F4E79 0%,#0F3454 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
  .center-card{background:white;border-radius:16px;padding:32px 28px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);}
  .center-title{text-align:center;margin:0 0 4px;color:var(--primary);font-size:22px;font-weight:800;letter-spacing:.05em;}
  .center-sub{text-align:center;color:var(--gray-500);font-size:12px;margin-bottom:24px;}

  .company-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:20px;background:var(--gray-100);padding:4px;border-radius:10px;}
  .company-tab{padding:10px 8px;border-radius:7px;font-size:13px;font-weight:600;color:var(--gray-600);transition:all .2s;}
  .company-tab.active{background:white;color:var(--primary);box-shadow:var(--shadow-sm);}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:12px;color:var(--gray-600);margin-bottom:6px;font-weight:600;}
  .form-input,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:8px;background:white;}
  .form-input:focus,.form-select:focus{outline:none;border-color:var(--primary);}
  .login-btn{width:100%;padding:12px;background:var(--primary);color:white;border-radius:8px;font-weight:700;font-size:15px;margin-top:8px;transition:background .2s;}
  .login-btn:hover{background:var(--primary-dark);}
  .login-btn:disabled{background:var(--gray-300);cursor:not-allowed;}
  .err-msg{color:var(--accent);font-size:12px;text-align:center;margin-top:10px;min-height:14px;}
  .login-divider{display:flex;align-items:center;color:var(--gray-400);margin:18px 0;font-size:11px;}
  .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--gray-200);}
  .login-divider span{padding:0 10px;}
  .lord-btn{width:100%;padding:10px;background:#F4E5C5;color:#7C5C00;border:1.5px dashed #BF8F00;border-radius:8px;font-weight:700;font-size:13px;}
  .lord-btn:hover{background:#EFD9A8;}
  .small-link{font-size:11px;color:var(--gray-400);display:block;text-align:center;margin-top:14px;cursor:pointer;}
  .small-link:hover{color:var(--primary);}

  /* ===== App Shell ===== */
  #app{min-height:100vh;display:none;}
  #app.show{display:flex;flex-direction:column;}
  .topbar{background:var(--primary);color:white;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);}
  .topbar-brand{font-weight:800;font-size:15px;letter-spacing:.04em;}
  .topbar-company{background:rgba(255,255,255,.18);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;}
  .topbar-spacer{flex:1;}
  .topbar-user{font-size:12px;opacity:.85;}
  .topbar-btn{padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.12);font-size:12px;font-weight:600;color:white;}
  .topbar-btn:hover{background:rgba(255,255,255,.22);}

  .layout{flex:1;display:flex;}
  .sidenav{width:200px;background:white;border-right:1px solid var(--gray-200);padding:14px 8px;display:flex;flex-direction:column;gap:4px;}
  .sidenav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-weight:600;color:var(--gray-700);text-align:left;font-size:13.5px;}
  .sidenav-item:hover{background:var(--gray-100);}
  .sidenav-item.active{background:var(--primary-light);color:var(--primary);}
  .sidenav-item .icon{width:20px;text-align:center;font-size:15px;}

  .main{flex:1;padding:20px 24px;overflow-y:auto;max-width:100%;}
  .page-header{margin-bottom:20px;}
  .page-title{font-size:22px;font-weight:800;color:var(--gray-800);margin:0 0 4px;}
  .page-sub{font-size:13px;color:var(--gray-500);margin:0;}
  .page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;}
  .btn{padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
  .btn-primary{background:var(--primary);color:white;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-ghost{background:white;color:var(--gray-700);border:1px solid var(--gray-200);}
  .btn-ghost:hover{background:var(--gray-100);}
  .btn-danger{background:#FEE2E2;color:#991B1B;}
  .btn-danger:hover{background:#FECACA;}

  /* ===== Kanban ===== */
  .kanban{display:grid;grid-template-columns:repeat(5,minmax(220px,1fr));gap:12px;margin-top:8px;}
  .kanban-col{background:var(--gray-100);border-radius:10px;padding:10px;min-height:240px;}
  .kanban-col-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;color:var(--gray-700);margin-bottom:10px;padding:0 4px;}
  .kanban-col-count{background:white;color:var(--gray-600);padding:2px 8px;border-radius:10px;font-size:11px;}
  .kanban-col[data-status="plan"] .kanban-col-head{color:var(--gray-700);}
  .kanban-col[data-status="do"] .kanban-col-head{color:var(--primary);}
  .kanban-col[data-status="check"] .kanban-col-head{color:var(--yellow);}
  .kanban-col[data-status="done"] .kanban-col-head{color:var(--green);}
  .kanban-col[data-status="hold"] .kanban-col-head{color:var(--accent);}
  .task-card{background:white;border-radius:8px;padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow-sm);cursor:pointer;border-left:3px solid var(--gray-300);transition:all .15s;}
  .task-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
  .task-card[data-priority="high"]{border-left-color:var(--accent);}
  .task-card[data-priority="med"]{border-left-color:var(--yellow);}
  .task-card[data-priority="low"]{border-left-color:var(--green);}
  .task-title{font-weight:700;font-size:13.5px;margin:0 0 6px;color:var(--gray-800);}
  .task-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:11px;color:var(--gray-500);}
  .task-tag{display:inline-block;padding:1px 6px;border-radius:4px;background:var(--gray-100);color:var(--gray-600);font-size:10px;font-weight:600;}
  .task-tag.auth-L1{background:var(--green-light);color:var(--green);}
  .task-tag.auth-L2{background:var(--yellow-light);color:var(--yellow);}
  .task-tag.auth-L3{background:var(--orange-light);color:var(--orange);}
  .task-tag.auth-L4{background:#FCE7F3;color:#9F1239;}
  .task-deadline{margin-left:auto;}
  .task-deadline.overdue{color:var(--accent);font-weight:700;}

  /* ===== Modal ===== */
  .modal-mask{position:fixed;inset:0;background:rgba(15,52,84,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal-mask.show{display:flex;}
  .modal{background:white;border-radius:14px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:white;z-index:1;}
  .modal-title{font-size:17px;font-weight:800;margin:0;color:var(--gray-800);}
  .modal-close{font-size:22px;color:var(--gray-400);padding:0 4px;}
  .modal-close:hover{color:var(--gray-700);}
  .modal-body{padding:18px 22px;}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:8px;background:var(--gray-50);}

  .field{margin-bottom:14px;}
  .field-label{display:block;font-size:12px;color:var(--gray-600);font-weight:700;margin-bottom:5px;}
  .field-label .req{color:var(--accent);}
  .field-hint{font-size:11px;color:var(--gray-400);margin-top:4px;}
  .field-input,.field-select,.field-textarea{width:100%;padding:9px 11px;border:1.5px solid var(--gray-200);border-radius:7px;background:white;}
  .field-input:focus,.field-select:focus,.field-textarea:focus{outline:none;border-color:var(--primary);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

  /* ===== Weekly Report ===== */
  .report-card{background:white;border-radius:12px;padding:20px;box-shadow:var(--shadow-sm);margin-bottom:14px;}
  .report-section{margin-bottom:16px;}
  .report-section-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .report-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;}
  .report-icon.done{background:var(--green);}
  .report-icon.block{background:var(--accent);}
  .report-icon.next{background:var(--primary);}
  .report-icon.decide{background:var(--yellow);}
  .report-icon.mood{background:var(--gray-500);}
  .report-section-title{font-weight:700;font-size:14px;color:var(--gray-800);}
  .related-tasks{background:var(--orange-light);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--gray-700);}
  .related-tasks-title{font-weight:700;color:var(--orange);margin-bottom:4px;font-size:11px;}

  /* ===== OGSM ===== */
  .ogsm-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  .ogsm-block{background:white;border-radius:12px;padding:18px 20px;box-shadow:var(--shadow-sm);border-left:4px solid var(--primary);}
  .ogsm-block h3{margin:0 0 8px;font-size:15px;color:var(--primary);font-weight:800;display:flex;align-items:center;gap:8px;}
  .ogsm-block h3 .letter{background:var(--primary);color:white;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .ogsm-row{display:grid;grid-template-columns:1fr 90px 90px 110px;gap:8px;padding:8px 0;border-bottom:1px dashed var(--gray-200);align-items:center;font-size:12.5px;}
  .ogsm-row.head{font-weight:700;color:var(--gray-500);font-size:11px;border-bottom:2px solid var(--gray-300);}
  .ogsm-row:last-child{border-bottom:none;}

  /* ===== PDCA Dashboard ===== */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .stat-card{background:white;border-radius:10px;padding:16px;box-shadow:var(--shadow-sm);}
  .stat-label{font-size:11px;color:var(--gray-500);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .stat-value{font-size:26px;font-weight:800;color:var(--gray-800);margin:4px 0;}
  .stat-sub{font-size:11px;color:var(--gray-400);}
  .stat-card.plan{border-top:3px solid var(--gray-400);}
  .stat-card.do{border-top:3px solid var(--primary);}
  .stat-card.check{border-top:3px solid var(--yellow);}
  .stat-card.done{border-top:3px solid var(--green);}
  .pdca-flow{background:white;border-radius:12px;padding:18px;box-shadow:var(--shadow-sm);}
  .pdca-flow h3{margin:0 0 12px;font-size:14px;color:var(--gray-700);}
  .bar-track{height:14px;background:var(--gray-100);border-radius:7px;overflow:hidden;display:flex;}

  /* ===== Toast ===== */
  .toast-stack{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;max-width:90vw;}
  .toast{background:var(--gray-800);color:white;padding:10px 16px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);animation:toast-in .25s ease;}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--accent);}
  .toast.warn{background:var(--yellow);}
  @keyframes toast-in{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

  /* ===== Mobile ===== */
  @media (max-width:768px){
    .layout{flex-direction:column;}
    .sidenav{width:100%;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--gray-200);padding:8px;gap:4px;flex-wrap:nowrap;}
    .sidenav-item{flex-shrink:0;padding:8px 12px;font-size:12.5px;}
    .main{padding:14px;}
    .kanban{grid-template-columns:1fr;}
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .field-row,.field-row-3{grid-template-columns:1fr;}
    .ogsm-row{grid-template-columns:1fr;gap:4px;}
    .ogsm-row.head{display:none;}
    .topbar-user{display:none;}
  }

  .empty-state{text-align:center;padding:40px 20px;color:var(--gray-400);font-size:13px;}
  .empty-state-icon{font-size:48px;opacity:.4;margin-bottom:8px;}

  details.help-block{background:var(--primary-light);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--gray-700);}
  details.help-block summary{cursor:pointer;font-weight:700;color:var(--primary);}
  details.help-block[open] summary{margin-bottom:8px;}

  .conn-banner{background:var(--yellow-light);border-bottom:1px solid var(--yellow);padding:6px 14px;font-size:12px;color:var(--gray-700);text-align:center;}
</style>
</head>
<body>

<!-- ===== Setup Screen ===== -->
<div id="setup" class="center-wrap hidden">
  <div class="center-card">
    <h1 class="center-title">Kevin's Team Building</h1>
    <p class="center-sub">初始化 ・ 首次使用需設定後端 API 網址</p>

    <div class="form-group">
      <label class="form-label">Apps Script Web App URL</label>
      <input class="form-input" type="text" id="setupUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
      <div class="field-hint" style="margin-top:6px;">由主公部署 Code.gs 後取得，請見《部署指引》。</div>
    </div>

    <button class="login-btn" id="setupBtn">測試連線並儲存</button>
    <div class="err-msg" id="setupErr"></div>
  </div>
</div>

<!-- ===== Login Screen ===== -->
<div id="login" class="center-wrap hidden">
  <div class="center-card">
    <h1 class="center-title">Kevin's Team Building</h1>
    <p class="center-sub">Three-Company Hub ・ v1.1 雲端版</p>

    <div class="company-tabs">
      <button class="company-tab active" data-company="fb">Feeling Bar</button>
      <button class="company-tab" data-company="mw">滿屋設計</button>
      <button class="company-tab" data-company="npw">凱文南坡萬</button>
    </div>

    <div class="form-group">
      <label class="form-label">使用者</label>
      <select class="form-select" id="loginUser"></select>
    </div>

    <div class="form-group">
      <label class="form-label">密碼</label>
      <input class="form-input" type="password" id="loginPwd" placeholder="輸入密碼" autocomplete="off">
    </div>

    <button class="login-btn" id="loginBtn">登入</button>
    <div class="err-msg" id="loginError"></div>

    <div class="login-divider"><span>OR</span></div>
    <button class="lord-btn" id="lordBtn">⚔️ 主公專屬登入（跨公司 + OGSM）</button>

    <span class="small-link" id="reSetupLink">⚙️ 重設後端 API 網址</span>
  </div>
</div>

<!-- ===== App Shell ===== -->
<div id="app">
  <div class="topbar">
    <span class="topbar-brand">⚔️ Kevin's Team Building</span>
    <span class="topbar-company" id="topCompany"></span>
    <span class="topbar-spacer"></span>
    <span class="topbar-user" id="topUser"></span>
    <button class="topbar-btn" id="refreshBtn" title="重新整理資料">🔄</button>
    <button class="topbar-btn" id="logoutBtn">登出</button>
  </div>

  <div class="layout">
    <nav class="sidenav" id="sidenav"></nav>
    <main class="main" id="main"></main>
  </div>
</div>

<!-- ===== Modals (Generic) ===== -->
<div class="modal-mask" id="modalMask">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <h3 class="modal-title" id="modalTitle">標題</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>
<div id="globalLoading"><div class="spinner"></div></div>

<script>
//=========================================================================
// 主公作戰指揮室 ・ v1.0 雲端版
// Backend: Google Apps Script + Google Sheet
// Frontend: 本檔案（單檔 HTML，呼叫 GAS API）
//=========================================================================

const COMPANY_LABEL = { fb:'Feeling Bar', mw:'滿屋設計', npw:'凱文南坡萬' };
const COMPANY_KEYS = ['fb','mw','npw'];

const STATUS = {
  plan:  { label: '📋 計畫 Plan',  color: 'var(--gray-500)' },
  do:    { label: '🚀 執行 Do',    color: 'var(--primary)'  },
  check: { label: '🔍 檢視 Check', color: 'var(--yellow)'   },
  done:  { label: '✅ 完成 Act',   color: 'var(--green)'    },
  hold:  { label: '⛔ 卡關 Hold',  color: 'var(--accent)'   },
};
const PRIORITY = { high:'高 ⚡', med:'中', low:'低' };
const AUTH = {
  L1: '🟢 L1 自決即報',
  L2: '🟡 L2 報備執行',
  L3: '🟠 L3 請示後行',
  L4: '🔴 L4 主公專斷',
};

// ===== Local persistence =====
const LS_URL    = 'cmdroom_gas_url';
const LS_TOKEN  = 'cmdroom_token';
const LS_CACHE  = 'cmdroom_cache';   // 離線快取的 STATE
const LS_LOGIN  = 'cmdroom_lastlogin'; // {company, username}

// ===== Global state =====
let GAS_URL = localStorage.getItem(LS_URL) || '';
let TOKEN   = localStorage.getItem(LS_TOKEN) || '';
let STATE   = null;             // server-returned init data
let currentCompany = null;
let currentPage = 'kanban';
let loginCompany = 'fb';

//=========================================================================
// API client
//=========================================================================
async function api(action, params = {}, opts = {}) {
  if (!GAS_URL) throw new Error('尚未設定後端 URL');
  const noAuthActions = ['ping','getUserList','login','lordLogin'];
  const useGet = noAuthActions.indexOf(action) >= 0 && !opts.forcePost;

  let url = GAS_URL;
  let init = { method:'GET' };
  if (useGet && (action === 'ping' || action === 'getUserList')) {
    const qs = new URLSearchParams({ action, ...params }).toString();
    url = GAS_URL + (GAS_URL.indexOf('?')>=0?'&':'?') + qs;
  } else {
    init = {
      method: 'POST',
      // 用 text/plain 避開 CORS preflight；後端 doPost 不依賴 Content-Type
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...(TOKEN?{token:TOKEN}:{}), ...params }),
    };
  }

  showLoading(true);
  try {
    const r = await fetch(url, init);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '伺服器錯誤');
    return j.data;
  } catch (e) {
    if (e instanceof TypeError) throw new Error('連線失敗，請確認 URL 與網路');
    throw e;
  } finally {
    showLoading(false);
  }
}

function showLoading(on) {
  document.getElementById('globalLoading').classList.toggle('show', !!on);
}

//=========================================================================
// Boot
//=========================================================================
document.addEventListener('DOMContentLoaded', boot);
async function boot() {
  if (!GAS_URL) return showSetup();
  // 嘗試用既有 token 自動進入
  if (TOKEN) {
    try {
      STATE = await api('getInitData');
      cacheState();
      currentCompany = STATE.me.isLord ? 'fb' : STATE.me.company;
      enterApp();
      return;
    } catch (e) {
      TOKEN = ''; localStorage.removeItem(LS_TOKEN);
    }
  }
  showLogin();
}

//=========================================================================
// Setup screen
//=========================================================================
function showSetup() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('show');
  const s = document.getElementById('setup');
  s.classList.remove('hidden');
  document.getElementById('setupUrl').value = GAS_URL;
}
document.getElementById('setupBtn').addEventListener('click', async () => {
  const url = document.getElementById('setupUrl').value.trim();
  const err = document.getElementById('setupErr');
  err.textContent = '';
  if (!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(url)) {
    err.textContent = '網址格式不對，應是 https://script.google.com/macros/s/.../exec';
    return;
  }
  GAS_URL = url;
  try {
    const pong = await api('ping');
    if (!pong.version) throw new Error('回應格式異常');
    localStorage.setItem(LS_URL, GAS_URL);
    showToast('連線成功（v' + pong.version + '）','success');
    document.getElementById('setup').classList.add('hidden');
    showLogin();
  } catch (e) {
    err.textContent = '連線失敗：' + e.message;
  }
});

//=========================================================================
// Login screen
//=========================================================================
async function showLogin() {
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('app').classList.remove('show');
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('loginPwd').value = '';
  document.getElementById('loginError').textContent = '';
  // 還原上次選擇
  try {
    const last = JSON.parse(localStorage.getItem(LS_LOGIN) || '{}');
    if (last.company && COMPANY_KEYS.indexOf(last.company)>=0) {
      loginCompany = last.company;
      document.querySelectorAll('.company-tab').forEach(b => b.classList.toggle('active', b.dataset.company===loginCompany));
    }
  } catch (e) {}
  await refreshLoginUsers();
}
document.querySelectorAll('.company-tab').forEach(btn => {
  btn.addEventListener('click', async () => {
    document.querySelectorAll('.company-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loginCompany = btn.dataset.company;
    document.getElementById('loginError').textContent = '';
    await refreshLoginUsers();
  });
});
async function refreshLoginUsers() {
  const sel = document.getElementById('loginUser');
  try {
    const users = await api('getUserList', { company: loginCompany });
    sel.innerHTML = users.map(u => `<option value="${escapeHtml(u.username)}">${escapeHtml(u.username)}</option>`).join('');
    // 還原上次帳號
    try {
      const last = JSON.parse(localStorage.getItem(LS_LOGIN) || '{}');
      if (last.username && last.company === loginCompany) sel.value = last.username;
    } catch (e) {}
  } catch (e) {
    sel.innerHTML = `<option value="">（${escapeHtml(e.message)}）</option>`;
  }
}
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('loginPwd').addEventListener('keypress', e => { if (e.key === 'Enter') tryLogin(); });
async function tryLogin() {
  const username = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPwd').value;
  const err = document.getElementById('loginError');
  err.textContent = '';
  if (!username) { err.textContent = '請選擇使用者'; return; }
  if (!password) { err.textContent = '請輸入密碼'; return; }
  try {
    const r = await api('login', { company: loginCompany, username, password });
    TOKEN = r.token; localStorage.setItem(LS_TOKEN, TOKEN);
    localStorage.setItem(LS_LOGIN, JSON.stringify({ company:loginCompany, username }));
    STATE = await api('getInitData');
    cacheState();
    currentCompany = STATE.me.company;
    document.getElementById('login').classList.add('hidden');
    enterApp();
  } catch (e) {
    err.textContent = e.message;
  }
}
document.getElementById('lordBtn').addEventListener('click', async () => {
  const pwd = prompt('請輸入主公密碼：');
  if (pwd === null) return;
  try {
    const r = await api('lordLogin', { password: pwd });
    TOKEN = r.token; localStorage.setItem(LS_TOKEN, TOKEN);
    localStorage.removeItem(LS_LOGIN);
    STATE = await api('getInitData');
    cacheState();
    currentCompany = 'fb';
    document.getElementById('login').classList.add('hidden');
    enterApp();
  } catch (e) {
    showToast(e.message, 'error');
  }
});
document.getElementById('reSetupLink').addEventListener('click', showSetup);

//=========================================================================
// Cache
//=========================================================================
function cacheState() {
  try { localStorage.setItem(LS_CACHE, JSON.stringify(STATE)); } catch(e) {}
}

//=========================================================================
// App Shell
//=========================================================================
function enterApp() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('app').classList.add('show');
  document.getElementById('topUser').textContent = STATE.me.username + (STATE.me.isLord?'（主公）':'') + '・' + roleLabel(STATE.me.role);
  renderTopCompany();
  renderSideNav();
  go('kanban');
}
function roleLabel(r) {
  return ({ lord:'主公', admin:'管理者', manager:'店長/主管', staff:'成員' }[r]) || r;
}
function renderTopCompany() {
  const el = document.getElementById('topCompany');
  if (STATE.me.isLord) {
    el.innerHTML = `<select id="lordCompanySwitch" style="background:transparent;border:1px solid rgba(255,255,255,.4);border-radius:5px;color:white;padding:2px 6px;font-size:12px;">
      ${COMPANY_KEYS.map(k => `<option value="${k}" ${currentCompany===k?'selected':''}>${COMPANY_LABEL[k]}</option>`).join('')}
    </select>`;
    document.getElementById('lordCompanySwitch').addEventListener('change', e => {
      currentCompany = e.target.value;
      renderSideNav();
      go(currentPage);
    });
  } else {
    el.textContent = COMPANY_LABEL[currentCompany];
  }
}
function renderSideNav() {
  const items = [
    { key:'kanban', icon:'📋', label:'任務看板' },
    { key:'report', icon:'📝', label:'週報 / 一對一' },
    { key:'pdca',   icon:'📊', label:'PDCA 儀表' },
  ];
  if (STATE.me.isLord || STATE.me.role === 'admin') {
    items.push({ key:'people', icon:'👥', label:'帳號管理' });
  }
  if (STATE.me.isLord) items.push({ key:'ogsm', icon:'🎯', label:'OGSM 戰略表' });
  items.push({ key:'profile', icon:'👤', label:'我的設定' });

  document.getElementById('sidenav').innerHTML = items.map(it =>
    `<button class="sidenav-item ${currentPage===it.key?'active':''}" data-go="${it.key}"><span class="icon">${it.icon}</span>${it.label}</button>`
  ).join('');
  document.querySelectorAll('.sidenav-item').forEach(b => b.addEventListener('click', () => go(b.dataset.go)));
}
function go(page) {
  currentPage = page;
  document.querySelectorAll('.sidenav-item').forEach(b => b.classList.toggle('active', b.dataset.go===page));
  const m = document.getElementById('main');
  m.scrollTop = 0;
  ({
    kanban: renderKanban,
    report: renderReport,
    pdca:   renderPdca,
    people: renderPeople,
    ogsm:   renderOgsm,
    profile: renderProfile,
  }[page] || renderKanban)(m);
}
document.getElementById('refreshBtn').addEventListener('click', async () => {
  try {
    STATE = await api('getInitData');
    cacheState();
    go(currentPage);
    showToast('已重新整理','success');
  } catch (e) {
    showToast(e.message, 'error');
  }
});
document.getElementById('logoutBtn').addEventListener('click', async () => {
  if (!confirm('確定登出？')) return;
  try { await api('logout'); } catch(e) {}
  TOKEN = ''; localStorage.removeItem(LS_TOKEN);
  STATE = null;
  document.getElementById('app').classList.remove('show');
  showLogin();
});

//=========================================================================
// Kanban — 任務看板
//=========================================================================
function renderKanban(m) {
  const tasks = (STATE.tasks?.[currentCompany]) || [];
  const me = STATE.me;
  const myView = me.isLord || ['admin','manager'].indexOf(me.role) >= 0;
  // staff 在 server 端已過濾為自己的任務；這裡無需再過濾
  const grouped = { plan:[], do:[], check:[], done:[], hold:[] };
  tasks.forEach(t => { (grouped[t.status]||grouped.plan).push(t); });
  Object.keys(grouped).forEach(k =>
    grouped[k].sort((a,b)=>(b.priority==='high')-(a.priority==='high') || (a.deadline||'').localeCompare(b.deadline||''))
  );
  const canCreate = me.isLord || ['admin','manager'].indexOf(me.role)>=0;

  m.innerHTML = `
    <div class="page-header">
      <h2 class="page-title">任務看板</h2>
      <p class="page-sub">${COMPANY_LABEL[currentCompany]} ・ ${myView?'全公司視角':'我的任務'} ・ 共 ${tasks.length} 件</p>
      <div class="page-actions">
        ${canCreate?`<button class="btn btn-primary" onclick="openTaskModal()">+ 新建任務</button>`:''}
        <button class="btn btn-ghost" onclick="document.getElementById('refreshBtn').click()">🔄 重新整理</button>
      </div>
    </div>

    <details class="help-block">
      <summary>💡 任務卡使用說明（軍師心法）</summary>
      <div style="margin-top:6px;line-height:1.7;">
        每張任務卡有五個欄位：<b>任務名稱・為什麼・完成樣貌・紅線・截止與檢核</b>。其中「為什麼」與「紅線」是最常被省略卻最重要的——沒有它，下屬只能死板照做或不敢決定。<br>
        狀態流轉（PDCA）：📋 計畫 → 🚀 執行 → 🔍 檢視 → ✅ 完成。卡關時可暫放 ⛔ Hold 並寫明阻塞原因。
      </div>
    </details>

    <div class="kanban">
      ${['plan','do','check','done','hold'].map(s => `
        <div class="kanban-col" data-status="${s}">
          <div class="kanban-col-head">
            <span>${STATUS[s].label}</span>
            <span class="kanban-col-count">${grouped[s].length}</span>
          </div>
          ${grouped[s].length===0
            ? `<div class="empty-state" style="padding:24px 8px;font-size:11.5px;">無任務</div>`
            : grouped[s].map(t => taskCard(t)).join('')}
        </div>
      `).join('')}
    </div>
  `;
  m.querySelectorAll('.task-card').forEach(c => c.addEventListener('click', () => openTaskModal(c.dataset.id)));
}
function taskCard(t) {
  const today = new Date().toISOString().slice(0,10);
  const overdue = t.deadline && t.deadline < today && t.status !== 'done';
  return `
    <div class="task-card" data-id="${t.id}" data-priority="${t.priority||'med'}">
      <div class="task-title">${escapeHtml(t.title)}</div>
      <div class="task-meta">
        <span class="task-tag auth-${t.authLevel||'L2'}">${(AUTH[t.authLevel]||AUTH.L2).split(' ')[0]}${t.authLevel||'L2'}</span>
        <span class="task-tag">→${escapeHtml(t.assignee||'未指派')}</span>
        ${t.deadline?`<span class="task-deadline ${overdue?'overdue':''}">⏰ ${t.deadline}</span>`:''}
      </div>
    </div>
  `;
}

function openTaskModal(id) {
  const tasks = STATE.tasks[currentCompany] || [];
  const t = id ? tasks.find(x => x.id === id) : null;
  const isNew = !t;
  const me = STATE.me;
  const data = t || {
    id:'', title:'', why:'', doneLook:'', redLines:'',
    deadline:'', midCheck:'',
    assignee: me.isLord ? '' : me.username,
    creator:  me.username,
    priority:'med', authLevel:'L2', status:'plan',
    company: currentCompany,
    createdAt:'', notes:[]
  };

  // 取得使用者列表（給 assignee 下拉用）
  // 主公 / admin 從 STATE.accounts；其餘成員退而求其次用 STATE.me.username 或既有任務的 assignee 集合
  let userList = [];
  if (STATE.accounts && STATE.accounts[currentCompany]) {
    userList = STATE.accounts[currentCompany].map(u => u.username);
  } else {
    const set = new Set([me.username]);
    tasks.forEach(t => { if (t.assignee) set.add(t.assignee); if (t.creator) set.add(t.creator); });
    userList = Array.from(set);
  }

  const canDelete = me.isLord || me.role==='admin' || data.creator===me.username;
  const canEdit = me.isLord || ['admin','manager'].indexOf(me.role)>=0
                  || data.creator===me.username || data.assignee===me.username || isNew;

  showModal({
    title: isNew?'新建任務卡':'任務卡詳情',
    body: `
      <div class="field">
        <label class="field-label">① 任務名稱 <span class="req">*</span></label>
        <input class="field-input" id="f-title" value="${escapeHtml(data.title)}" placeholder="動詞開頭，一句話講清楚要做什麼">
      </div>
      <div class="field">
        <label class="field-label">② 為什麼（這件事服務的更大目標）</label>
        <textarea class="field-textarea" id="f-why" placeholder="讓接手者知道方向，遇到變化能自己取捨">${escapeHtml(data.why)}</textarea>
      </div>
      <div class="field">
        <label class="field-label">③ 完成長什麼樣子（可驗收）</label>
        <textarea class="field-textarea" id="f-done" placeholder="可拍照、可數字、可勾選的具體樣貌">${escapeHtml(data.doneLook)}</textarea>
      </div>
      <div class="field">
        <label class="field-label">④ 紅線（不能跨過的底線）</label>
        <textarea class="field-textarea" id="f-red" placeholder="預算、時程、品質、品牌、合作關係…">${escapeHtml(data.redLines)}</textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">⑤ 截止日</label>
          <input class="field-input" type="date" id="f-deadline" value="${data.deadline||''}">
        </div>
        <div class="field">
          <label class="field-label">中段檢視點</label>
          <input class="field-input" type="date" id="f-mid" value="${data.midCheck||''}">
        </div>
      </div>
      <div class="field-row-3">
        <div class="field">
          <label class="field-label">指派給</label>
          <select class="field-select" id="f-assignee">
            <option value="">未指派</option>
            ${userList.map(u => `<option value="${escapeHtml(u)}" ${data.assignee===u?'selected':''}>${escapeHtml(u)}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label class="field-label">優先級</label>
          <select class="field-select" id="f-priority">
            ${Object.entries(PRIORITY).map(([k,v]) => `<option value="${k}" ${data.priority===k?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label class="field-label">授權等級</label>
          <select class="field-select" id="f-auth">
            ${Object.entries(AUTH).map(([k,v]) => `<option value="${k}" ${data.authLevel===k?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field">
        <label class="field-label">狀態（PDCA）</label>
        <select class="field-select" id="f-status">
          ${Object.entries(STATUS).map(([k,v]) => `<option value="${k}" ${data.status===k?'selected':''}>${v.label}</option>`).join('')}
        </select>
      </div>
      ${data.notes && data.notes.length ? `
      <div class="field">
        <label class="field-label">進度紀錄</label>
        <div style="background:var(--gray-50);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--gray-700);max-height:140px;overflow-y:auto;">
          ${data.notes.map(n => `<div style="padding:4px 0;border-bottom:1px dashed var(--gray-200);">[${(n.at||'').slice(0,10)} ${escapeHtml(n.by)}] ${escapeHtml(n.text)}</div>`).join('')}
        </div>
      </div>` : ''}
      <div class="field">
        <label class="field-label">新增進度／回報（可留空）</label>
        <textarea class="field-textarea" id="f-newnote" placeholder="例：今日已聯繫供應商 X，等明日報價。"></textarea>
      </div>
      ${!isNew?`<p class="field-hint">建立者：${escapeHtml(data.creator)} ・ 建立於 ${(data.createdAt||'').slice(0,16).replace('T',' ')}</p>`:''}
    `,
    foot: `
      ${(!isNew && canDelete) ? `<button class="btn btn-danger" onclick="deleteTask('${data.id}')">刪除</button>` : ''}
      <span style="flex:1;"></span>
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      ${canEdit ? `<button class="btn btn-primary" onclick="saveTask(${isNew?'null':JSON.stringify(data.id)})">${isNew?'建立任務':'儲存變更'}</button>` : '<span style="color:var(--gray-400);font-size:12px;align-self:center;">您僅可檢視</span>'}
    `,
  });
}
async function saveTask(id) {
  const get = sel => document.getElementById(sel).value.trim();
  const title = get('f-title');
  if (!title) { showToast('任務名稱必填','error'); return; }
  const newNote = get('f-newnote');
  const task = {
    id: id || '',
    company: currentCompany,
    title,
    why:        get('f-why'),
    doneLook:   get('f-done'),
    redLines:   get('f-red'),
    deadline:   get('f-deadline'),
    midCheck:   get('f-mid'),
    assignee:   get('f-assignee'),
    priority:   get('f-priority'),
    authLevel:  get('f-auth'),
    status:     get('f-status'),
  };
  if (newNote) task.notes = [{ at:new Date().toISOString(), by:STATE.me.username, text:newNote }];

  try {
    await api('saveTask', { task });
    STATE = await api('getInitData'); cacheState();
    closeModal();
    go('kanban');
    showToast(id?'已儲存':'已建立任務','success');
  } catch (e) {
    showToast(e.message,'error');
  }
}
async function deleteTask(id) {
  if (!confirm('確定刪除此任務？無法復原。')) return;
  try {
    await api('deleteTask', { company: currentCompany, taskId: id });
    STATE = await api('getInitData'); cacheState();
    closeModal();
    go('kanban');
    showToast('已刪除','warn');
  } catch (e) {
    showToast(e.message,'error');
  }
}

//=========================================================================
// Weekly Report
//=========================================================================
function renderReport(m) {
  const me = STATE.me;
  const allReports = (STATE.reports?.[currentCompany]) || [];
  const myReports = me.isLord || me.role==='admin' ? allReports : allReports.filter(r => r.username === me.username);
  const allTasks = (STATE.tasks?.[currentCompany]) || [];
  const myTasks = allTasks.filter(t => t.assignee === me.username);
  const today = new Date().toISOString().slice(0,10);
  const blockedOrInProgress = myTasks.filter(t => ['do','hold'].includes(t.status));
  const overdue = myTasks.filter(t => t.deadline && t.deadline < today && t.status !== 'done');
  const wk = currentWeekId();
  const existing = allReports.find(r => r.username===me.username && r.weekId===wk);
  const isOneOnOneWeek = isEvenWeek(wk);

  m.innerHTML = `
    <div class="page-header">
      <h2 class="page-title">本週週報</h2>
      <p class="page-sub">${COMPANY_LABEL[currentCompany]} ・ ${escapeHtml(me.username)} ・ 週次 ${wk}</p>
    </div>

    <details class="help-block">
      <summary>💡 軍師提醒：週報 = 5 分鐘可填、1 分鐘可看</summary>
      <div style="margin-top:6px;line-height:1.7;">
        寫長等於沒寫——主公不會看。<br>
        ① 完成（≤3 件，動詞開頭，帶數字） ② 卡關／風險（需要協助請具體寫） ③ 下週重點（≤3 件，對齊北極星） ④ 我自己決定的事（L1/L2 內主動做的，練判斷力） ⑤ 心情（這欄是組織溫度雷達）<br>
        ${isOneOnOneWeek?'<b style="color:var(--primary);">本週是雙週一對一週次</b>，請於最下方額外回答三大問。':'本週<b>非</b>一對一週次，下週為一對一週。'}
      </div>
    </details>

    ${(blockedOrInProgress.length || overdue.length) ? `
      <div class="related-tasks">
        <div class="related-tasks-title">📌 自動帶入：你目前未完成的任務</div>
        ${overdue.length?`<div style="color:var(--accent);">⚠️ 已逾期 ${overdue.length} 件：${overdue.map(t=>escapeHtml(t.title)).join('・')}</div>`:''}
        ${blockedOrInProgress.length?`<div>🚀 進行中／卡關共 ${blockedOrInProgress.length} 件：${blockedOrInProgress.map(t=>`${escapeHtml(t.title)}（${STATUS[t.status].label.split(' ')[0]}）`).join('・')}</div>`:''}
      </div>
    ` : ''}

    <div class="report-card">
      ${reportField('done',  '①','本週完成（≤3 件）', existing?.done||'',          'var(--green)','例：完成母親節活動素材 5 張、IG 觸及 ＋12%')}
      ${reportField('block', '②','卡關／風險', existing?.blocking||'',              'var(--accent)','需要主公幫忙的具體寫出來；無則寫「無」')}
      ${reportField('next',  '③','下週重點（≤3 件）', existing?.nextWeek||'',       'var(--primary)','對齊本週軍令的北極星')}
      ${reportField('decide','④','我自己決定的事（L1/L2）', existing?.ownDecisions||'','var(--yellow)','列出來，培養做決定的肌肉')}
      ${reportField('mood',  '⑤','一句話心情', existing?.mood||'',                  'var(--gray-500)','這週累不累？哪裡有成就感？哪裡被卡？','input')}

      ${isOneOnOneWeek ? `
        <div style="margin-top:24px;padding-top:20px;border-top:2px dashed var(--primary);">
          <h3 style="margin:0 0 4px;color:var(--primary);font-size:15px;">🤝 雙週一對一三大問</h3>
          <p style="font-size:11px;color:var(--gray-500);margin:0 0 14px;">先用文字回答，下次一對一面談時主公會逐題與您對話</p>
          <div class="field">
            <label class="field-label">Q1. 這兩週你最自豪的判斷是什麼？為什麼？</label>

async function saveReport(withOneOnOne) {

// PDCA Dashboard
//=========================================================================
function renderPdca(m) {
  const tasks = (STATE.tasks?.[currentCompany]) || [];
  const today = new Date().toISOString().slice(0,10);
  const counts = {plan:0,do:0,check:0,done:0,hold:0};
  tasks.forEach(t => counts[t.status] = (counts[t.status]||0)+1);
  const total = tasks.length;
  const overdue = tasks.filter(t => t.deadline && t.deadline < today && t.status!=='done').length;
  const completionRate = total ? Math.round(counts.done/total*100) : 0;
  const avgCycle = avgCycleDays(tasks);
  const byAssignee = {};
  tasks.forEach(t => {
    const k = t.assignee || '未指派';
    if (!byAssignee[k]) byAssignee[k] = {plan:0,do:0,check:0,done:0,hold:0,total:0};
    byAssignee[k][t.status] = (byAssignee[k][t.status]||0)+1;
    byAssignee[k].total++;
  });

  m.innerHTML = `
    <div class="page-header">
      <h2 class="page-title">PDCA 監控儀表</h2>
      <p class="page-sub">${COMPANY_LABEL[currentCompany]} ・ 共 ${total} 件任務</p>
    </div>

    <div class="stat-grid">
      <div class="stat-card plan"><div class="stat-label">📋 Plan 計畫</div><div class="stat-value">${counts.plan}</div><div class="stat-sub">尚未啟動</div></div>
      <div class="stat-card do"><div class="stat-label">🚀 Do 執行</div><div class="stat-value">${counts.do}</div><div class="stat-sub">進行中</div></div>
      <div class="stat-card check"><div class="stat-label">🔍 Check 檢視</div><div class="stat-value">${counts.check}</div><div class="stat-sub">待驗收</div></div>
      <div class="stat-card done"><div class="stat-label">✅ Act 完成</div><div class="stat-value">${counts.done}</div><div class="stat-sub">完成率 ${completionRate}%</div></div>
    </div>

    <div class="stat-grid">
      <div class="stat-card" style="border-top:3px solid var(--accent);"><div class="stat-label">⛔ Hold 卡關</div><div class="stat-value" style="color:${counts.hold>0?'var(--accent)':''}">${counts.hold}</div><div class="stat-sub">需主公介入</div></div>
      <div class="stat-card" style="border-top:3px solid var(--accent);"><div class="stat-label">⏰ 已逾期</div><div class="stat-value" style="color:${overdue>0?'var(--accent)':''}">${overdue}</div><div class="stat-sub">${overdue>0?'需立即處理':'良好'}</div></div>
      <div class="stat-card"><div class="stat-label">⏱ 平均週期</div><div class="stat-value">${avgCycle}<span style="font-size:14px;color:var(--gray-500);"> 天</span></div><div class="stat-sub">建立→完成</div></div>
      <div class="stat-card"><div class="stat-label">📈 完成率</div><div class="stat-value">${completionRate}<span style="font-size:14px;color:var(--gray-500);">%</span></div><div class="stat-sub">已完成 / 總數</div></div>
    </div>

    <div class="pdca-flow">
      <h3>👥 各成員 PDCA 分布</h3>
      ${Object.keys(byAssignee).length===0 ? `<div class="empty-state">尚無資料</div>` :
      Object.entries(byAssignee).sort((a,b)=>b[1].total-a[1].total).map(([who, c]) => {
        const tot = c.total || 1;
        return `
          <div style="margin-bottom:12px;">
            <div style="font-weight:700;font-size:13px;margin-bottom:4px;">${escapeHtml(who)} <span style="color:var(--gray-400);font-size:11px;font-weight:400;">共 ${c.total} 件</span></div>
            <div class="bar-track">
              <div style="background:var(--gray-400);width:${c.plan/tot*100}%;"></div>
              <div style="background:var(--primary);width:${c.do/tot*100}%;"></div>
              <div style="background:var(--yellow);width:${c.check/tot*100}%;"></div>
              <div style="background:var(--green);width:${c.done/tot*100}%;"></div>
              <div style="background:var(--accent);width:${c.hold/tot*100}%;"></div>
            </div>
            <div style="font-size:11px;color:var(--gray-500);margin-top:3px;">📋${c.plan} 🚀${c.do} 🔍${c.check} ✅${c.done} ⛔${c.hold}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

  });

async function saveUser(company, originalUsername) {
  const user = {
    username: document.getElementById('u-name').value.trim(),
    password: document.getElementById('u-pwd').value,
    role: document.getElementById('u-role').value,
    locked: document.getElementById('u-locked') ? Number(document.getElementById('u-locked').value) : 0,
  };
  if (!user.username) { showToast('使用者名稱必填','error'); return; }
  try {
    await api('saveUser', { company, user, originalUsername });
    closeModal();
    go('people');
    showToast('已儲存','success');
  } catch (e) {
    showToast(e.message,'error');
  }
}
function togglePwdAll(btn) {
  const cells = document.querySelectorAll('.pwd-cell');
  if (!cells.length) return;
  const showing = cells[0].textContent !== cells[0].dataset.mask;
  cells.forEach(c => { c.textContent = showing ? c.dataset.mask : c.dataset.clear; });
  if (btn) btn.textContent = showing ? '👁' : '🙈';
}
async function deleteUser(company, username) {
  if (!confirm('確定刪除此使用者？')) return;
  try {
    await api('deleteUser', { company, username });
    closeModal();
    go('people');
    showToast('已刪除','warn');
  } catch (e) {
    showToast(e.message,'error');
  }
}

function ogsmGoalRow(g={}) {
  return `
    <div class="ogsm-row">
      <input class="field-input" data-k="name"     value="${escapeHtml(g.name||'')}"     placeholder="例：週營收">
      <input class="field-input" data-k="current"  value="${escapeHtml(g.current||'')}"  placeholder="現值">
      <input class="field-input" data-k="target"   value="${escapeHtml(g.target||'')}"   placeholder="目標">
      <input class="field-input" data-k="deadline" value="${escapeHtml(g.deadline||'')}" type="date">
    </div>`;
}
function ogsmStrategyRow(s={}) {
  return `
    <div class="ogsm-row" style="grid-template-columns:1fr 2fr 110px;">
      <input class="field-input" data-k="name"        value="${escapeHtml(s.name||'')}"        placeholder="例：晚間外送社團團購">
      <input class="field-input" data-k="description" value="${escapeHtml(s.description||'')}" placeholder="一句話說明做法">
      <input class="field-input" data-k="owner"       value="${escapeHtml(s.owner||'')}"       placeholder="負責人">
    </div>`;
}
function ogsmMeasureRow(m={}) {
  return `
    <div class="ogsm-row">
      <input class="field-input" data-k="name"     value="${escapeHtml(m.name||'')}"     placeholder="例：團購社團每週發文 ≥3">
      <input class="field-input" data-k="current"  value="${escapeHtml(m.current||'')}"  placeholder="現值">
      <input class="field-input" data-k="target"   value="${escapeHtml(m.target||'')}"   placeholder="目標">
      <input class="field-input" data-k="owner"    value="${escapeHtml(m.owner||'')}"    placeholder="截止 / 負責人">
    </div>`;
}
function ogsmAdd(section) {
  const el = document.getElementById('o-'+section);
  const html = section==='goals' ? ogsmGoalRow()
            : section==='strategies' ? ogsmStrategyRow()
            : ogsmMeasureRow();
  el.insertAdjacentHTML('beforeend', html);
}
async function saveOgsm() {
  const ogsm = {
    objective:  document.getElementById('o-obj').value.trim(),
    goals:      readOgsmRows('o-goals',      ['name','current','target','deadline']),
    strategies: readOgsmRows('o-strategies', ['name','description','owner']),
    measures:   readOgsmRows('o-measures',   ['name','current','target','owner']),
  };
  try {
    await api('saveOgsm', { company: currentCompany, ogsm });
    STATE = await api('getInitData'); cacheState();
    showToast('OGSM 已儲存','success');
    go('ogsm');
  } catch (e) {
    showToast(e.message,'error');
  }
}
function readOgsmRows(id, keys) {
  const rows = document.getElementById(id).children;
  return Array.from(rows).map(row => {
    const obj = {};
    keys.forEach(k => {
      const inp = row.querySelector(`[data-k="${k}"]`);
      obj[k] = inp ? inp.value.trim() : '';
    });
    return obj;
  }).filter(o => Object.values(o).some(v => v));
}

          <button class="btn btn-primary" onclick="changeMyPassword()">變更密碼</button>
        </div>
      </div>
    `}
  `;
}
async function changeMyPassword() {
  const o = document.getElementById('p-old').value;
  const n = document.getElementById('p-new').value;
  const n2 = document.getElementById('p-new2').value;
  if (!o || !n) { showToast('請填寫舊／新密碼','error'); return; }
  if (n !== n2) { showToast('兩次輸入的新密碼不一致','error'); return; }
  if (n.length < 4) { showToast('新密碼至少 4 碼','error'); return; }
  try {
    await api('changeMyPassword', { oldPassword:o, newPassword:n });
    showToast('密碼已變更，請以新密碼重新登入','success');
    setTimeout(() => document.getElementById('logoutBtn').click(), 1500);
  } catch (e) {
    showToast(e.message,'error');
  }
}

//=========================================================================
// Modal & Toast
//=========================================================================
function showModal({ title, body, foot }) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFoot').innerHTML = foot;
  document.getElementById('modalMask').classList.add('show');
}
function closeModal() { document.getElementById('modalMask').classList.remove('show'); }
document.getElementById('modalMask').addEventListener('click', e => { if (e.target.id==='modalMask') closeModal(); });
function showToast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.getElementById('toastStack').appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

//=========================================================================
// Helpers
//=========================================================================
function escapeHtml(s) {
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
}
function currentWeekId(d=new Date()) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  const wk = Math.ceil(((dt - yearStart)/86400000 + 1)/7);
  return `${dt.getUTCFullYear()}-W${String(wk).padStart(2,'0')}`;
}
function isEvenWeek(weekId) {
  const wk = parseInt(weekId.split('W')[1] || '0', 10);
  return wk % 2 === 0;
}
function avgCycleDays(tasks) {
  const completed = tasks.filter(t => t.status==='done' && t.createdAt && t.completedAt);
  if (!completed.length) return '–';
  const days = completed.reduce((sum,t) => sum + (new Date(t.completedAt) - new Date(t.createdAt))/86400000, 0) / completed.length;
  return days.toFixed(1);
}

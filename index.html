<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>任務卡佈告欄</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231F4E79'/%3E%3Ctext x='32' y='44' font-size='32' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold' font-size='28'%3E任務%3C/text%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  :root{
    /* === 品牌色（亮暗共用） === */
    --primary:#1F4E79; --primary-dark:#0F3454; --primary-light:#D9E2F3;
    --accent:#C00000; --green:#548235; --green-light:#E2EFDA;
    --yellow:#BF8F00; --yellow-light:#FFF2CC;
    --orange:#C65911; --orange-light:#FBE5D6;
    /* === Light mode 預設 === */
    --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB;
    --gray-300:#D1D5DB; --gray-400:#9CA3AF; --gray-500:#6B7280;
    --gray-600:#4B5563; --gray-700:#374151; --gray-800:#1F2937;
    --bg-page:#F9FAFB; --bg-card:#FFFFFF; --bg-sidenav:#FFFFFF;
    --bg-modal:#FFFFFF; --bg-kanban-col:#F3F4F6;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
    --shadow:0 2px 6px rgba(0,0,0,.08);
    --shadow-lg:0 8px 24px rgba(0,0,0,.12);
    --radius:10px;
  }
  /* === Dark mode 覆蓋 === */
  [data-theme="dark"]{
    --primary-light:#1E3A5F;
    --green-light:#1F3528;
    --yellow-light:#3D2E12;
    --orange-light:#3D2516;
    /* 反向 gray 系列：50 變深、800 變淺 */
    --gray-50:#0F172A;
    --gray-100:#1E293B;
    --gray-200:#334155;
    --gray-300:#475569;
    --gray-400:#64748B;
    --gray-500:#94A3B8;
    --gray-600:#CBD5E1;
    --gray-700:#E2E8F0;
    --gray-800:#F1F5F9;
    /* 區塊背景 */
    --bg-page:#0F172A;
    --bg-card:#1E293B;
    --bg-sidenav:#1E293B;
    --bg-modal:#1E293B;
    --bg-kanban-col:#0B1220;
    /* 深色陰影改為較強 */
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 2px 6px rgba(0,0,0,.4);
    --shadow-lg:0 8px 24px rgba(0,0,0,.6);
  }

  /* ===== v1.7.1 Dark mode 全域對比強化（一次解決所有盲點） ===== */
  /* 1. select 的原生 <option> 在 dark mode 強制深底白字（瀏覽器原本是白底） */
  [data-theme="dark"] select option,
  [data-theme="dark"] select optgroup{
    background:#1E293B !important;
    color:#F1F5F9 !important;
  }
  /* 2. topbar 內的公司切換下拉（inline style 蓋過 var，這裡用更高優先級覆蓋） */
  [data-theme="dark"] #lordCompanySwitch{
    background:#0F3454 !important;
    border-color:rgba(167,194,232,.5) !important;
    color:#F1F5F9 !important;
  }
  [data-theme="dark"] #lordCompanySwitch option{
    background:#1E293B !important;
    color:#F1F5F9 !important;
  }
  /* 3. loading mask 在 dark mode 改為深色透明（原本是半透明白會閃） */
  [data-theme="dark"] #globalLoading{
    background:rgba(15,23,42,.75) !important;
  }
  /* 4. modal 標題 / body / foot 全部吃 dark 變數 */
  [data-theme="dark"] .modal{background:var(--bg-modal);}
  [data-theme="dark"] .modal-head{background:var(--bg-modal);border-color:var(--gray-200);}
  [data-theme="dark"] .modal-foot{background:var(--gray-100);border-color:var(--gray-200);}
  [data-theme="dark"] .modal-title{color:var(--gray-800);}
  [data-theme="dark"] .modal-close{color:var(--gray-500);}
  [data-theme="dark"] .modal-close:hover{color:var(--gray-800);}
  /* 5. 所有 input / textarea / select 統一 dark 視覺 */
  [data-theme="dark"] .field-input,
  [data-theme="dark"] .field-select,
  [data-theme="dark"] .field-textarea,
  [data-theme="dark"] .form-input,
  [data-theme="dark"] .form-select{
    background:var(--bg-card);
    color:var(--gray-800);
    border-color:var(--gray-200);
  }
  [data-theme="dark"] .field-input::placeholder,
  [data-theme="dark"] .field-textarea::placeholder,
  [data-theme="dark"] .form-input::placeholder{color:var(--gray-500);}
  /* 6. 帳號管理頁的密碼 cell（inline style 用 var(--gray-700) 在 dark 下變淺，加強） */
  [data-theme="dark"] .pwd-cell{color:#F1F5F9;}
  /* 7. 按鈕 ghost 變體（白底在 dark 下難看） */
  [data-theme="dark"] .btn-ghost{background:var(--bg-card);color:var(--gray-700);border-color:var(--gray-200);}
  [data-theme="dark"] .btn-ghost:hover{background:var(--gray-100);}
  /* 8. 卡片內所有 task-tag（除已有專用樣式者）改強對比 */
  [data-theme="dark"] .task-tag{background:var(--gray-100);color:var(--gray-700);}
  [data-theme="dark"] .task-meta{color:var(--gray-600);}
  /* 9. PDCA 儀表 stat-card 在 dark 下白底改深 */
  [data-theme="dark"] .stat-card{background:var(--bg-card);}
  [data-theme="dark"] .stat-value{color:var(--gray-800);}
  /* 10. 員工 tab、status pill 在 dark 下白底太亮 */
  [data-theme="dark"] .member-tab{color:var(--gray-600);}
  [data-theme="dark"] .member-tab:hover{background:var(--gray-100);}
  [data-theme="dark"] .member-tab .badge{background:var(--bg-card);color:var(--gray-700);}
  [data-theme="dark"] .status-pill{background:var(--bg-card);color:var(--gray-700);border-color:var(--gray-200);}
  /* 11. 報告卡 / OGSM 卡 / 帳號管理表格在 dark 下白底改深 */
  [data-theme="dark"] .report-card{background:var(--bg-card);}
  [data-theme="dark"] .ogsm-block{background:var(--bg-card);}
  [data-theme="dark"] .pdca-flow{background:var(--bg-card);}
  /* 12. 帳號管理橫條與表格 row 統一 */
  [data-theme="dark"] [style*="background:white"]{background:var(--bg-card) !important;}
  [data-theme="dark"] [style*="background:#F3F4F6"]{background:var(--gray-100) !important;}
  [data-theme="dark"] [style*="background:#FFF8DC"]{background:#3D2E12 !important;color:#FDE68A !important;}
  /* 13. 詳情頁淺色背景塊（field-row、進度紀錄、子任務列表等）強化 */
  [data-theme="dark"] [style*="background:var(--gray-50)"]{background:var(--gray-100) !important;}
  /* 14. dispatch-date 在 dark 下白色背景太亮 */
  [data-theme="dark"] .dispatch-date{background:var(--gray-100);color:var(--gray-600);}
  /* 15. 關閉橫幅、警示橫幅在 dark 下調整 */
  [data-theme="dark"] [style*="background:#FEE2E2"]{background:#3F1D1D !important;color:#FCA5A5 !important;}
  [data-theme="dark"] [style*="background:#FEF3C7"]{background:#3D2E12 !important;color:#FDE68A !important;}
  [data-theme="dark"] [style*="background:#DBEAFE"]{background:#1E3A5F !important;color:#A7C2E8 !important;}
  [data-theme="dark"] [style*="background:#E2EFDA"]{background:#1F3528 !important;color:#86EFAC !important;}
  [data-theme="dark"] [style*="background:#FBE5D6"]{background:#3D2516 !important;color:#FED7AA !important;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",-apple-system,sans-serif;background:var(--bg-page);color:var(--gray-800);font-size:14px;line-height:1.55;transition:background-color .2s, color .2s;width:100%;max-width:100%;overflow-x:hidden;}
  body{min-width:0;-webkit-text-size-adjust:100%;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;}
  input,textarea,select{font-family:inherit;font-size:14px;}
  textarea{resize:vertical;min-height:60px;}
  .hidden{display:none!important;}

  /* ===== 全域載入 ===== */
  #globalLoading{position:fixed;inset:0;background:rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;z-index:1000;}
  #globalLoading.show{display:flex;}
  .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== Setup / Login 共用容器 ===== */
  .center-wrap{min-height:100vh;background:linear-gradient(135deg,#1F4E79 0%,#0F3454 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
  .center-card{background:var(--bg-card);border-radius:16px;padding:32px 28px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);}
  .center-title{text-align:center;margin:0 0 4px;color:var(--primary);font-size:22px;font-weight:800;letter-spacing:.05em;}
  .center-sub{text-align:center;color:var(--gray-500);font-size:12px;margin-bottom:24px;}

  .company-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:20px;background:var(--gray-100);padding:4px;border-radius:10px;}
  .company-tab{padding:10px 8px;border-radius:7px;font-size:13px;font-weight:600;color:var(--gray-600);transition:all .2s;}
  .company-tab.active{background:var(--bg-card);color:var(--primary);box-shadow:var(--shadow-sm);}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:12px;color:var(--gray-600);margin-bottom:6px;font-weight:600;}
  .form-input,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:8px;background:var(--bg-card);color:var(--gray-800);}
  .form-input:focus,.form-select:focus{outline:none;border-color:var(--primary);}
  .login-btn{width:100%;padding:12px;background:var(--primary);color:white;border-radius:8px;font-weight:700;font-size:15px;margin-top:8px;transition:background .2s;}
  .login-btn:hover{background:var(--primary-dark);}
  .login-btn:disabled{background:var(--gray-300);cursor:not-allowed;}
  .err-msg{color:var(--accent);font-size:12px;text-align:center;margin-top:10px;min-height:14px;}
  .login-divider{display:flex;align-items:center;color:var(--gray-400);margin:18px 0;font-size:11px;}
  .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--gray-200);}
  .login-divider span{padding:0 10px;}
  .lord-btn{width:100%;padding:10px;background:#F4E5C5;color:#7C5C00;border:1.5px dashed #BF8F00;border-radius:8px;font-weight:700;font-size:13px;}
  .lord-btn:hover{background:#EFD9A8;}
  .small-link{font-size:11px;color:var(--gray-400);display:block;text-align:center;margin-top:14px;cursor:pointer;}
  .small-link:hover{color:var(--primary);}

  /* ===== App Shell ===== */
  #app{min-height:100vh;display:none;}
  #app.show{display:flex;flex-direction:column;}
  .topbar{background:var(--primary);color:white;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);}
  .topbar-brand{font-weight:800;font-size:15px;letter-spacing:.04em;}
  .topbar-company{background:rgba(255,255,255,.18);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;}
  .topbar-spacer{flex:1;}
  .topbar-user{font-size:12px;opacity:.85;}
  .topbar-btn{padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.12);font-size:12px;font-weight:600;color:white;}
  .topbar-btn:hover{background:rgba(255,255,255,.22);}

  .layout{flex:1;display:flex;}
  .sidenav{width:200px;background:var(--bg-card);border-right:1px solid var(--gray-200);padding:14px 8px;display:flex;flex-direction:column;gap:4px;}
  .sidenav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-weight:600;color:var(--gray-700);text-align:left;font-size:13.5px;}
  .sidenav-item:hover{background:var(--gray-100);}
  .sidenav-item.active{background:var(--primary-light);color:var(--primary);}
  .sidenav-item .icon{width:20px;text-align:center;font-size:15px;}

  .main{flex:1;padding:20px 24px;overflow-y:auto;max-width:100%;}
  .page-header{margin-bottom:20px;}
  .page-title{font-size:22px;font-weight:800;color:var(--gray-800);margin:0 0 4px;}
  .page-sub{font-size:13px;color:var(--gray-500);margin:0;}
  .page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;}
  .btn{padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
  .btn-primary{background:var(--primary);color:white;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-ghost{background:var(--bg-card);color:var(--gray-700);border:1px solid var(--gray-200);}
  .btn-ghost:hover{background:var(--gray-100);}
  .btn-danger{background:#FEE2E2;color:#991B1B;}
  .btn-danger:hover{background:#FECACA;}

  /* ===== Member tabs ===== */
  .member-tabs{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 10px;padding:6px;background:var(--gray-100);border-radius:10px;overflow-x:auto;}
  .member-tab{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:600;color:var(--gray-600);white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
  .member-tab:hover{background:var(--bg-card);}
  .member-tab.active{background:var(--primary);color:white;box-shadow:var(--shadow-sm);}
  .member-tab .badge{background:rgba(255,255,255,.25);color:inherit;padding:1px 6px;border-radius:8px;font-size:10px;}
  .member-tab:not(.active) .badge{background:var(--bg-card);}

  /* ===== Status filter pills ===== */
  .status-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .status-pill{padding:5px 11px;border-radius:14px;font-size:12px;font-weight:600;background:var(--bg-card);color:var(--gray-600);border:1.5px solid var(--gray-200);}
  .status-pill:hover{border-color:var(--primary-light);}
  .status-pill.active{background:var(--primary);color:white;border-color:var(--primary);}

  /* ===== Performance summary banner ===== */
  .perf-banner{background:linear-gradient(135deg,#1F4E79,#2D5F8E);color:white;border-radius:12px;padding:16px 20px;margin-bottom:14px;box-shadow:var(--shadow);}
  .perf-banner h3{margin:0 0 4px;font-size:16px;font-weight:800;}
  .perf-banner-sub{font-size:11px;opacity:.75;margin-bottom:12px;}
  .perf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .perf-stat{background:rgba(255,255,255,.1);border-radius:8px;padding:10px;}
  .perf-stat-label{font-size:10px;opacity:.75;font-weight:700;letter-spacing:.04em;}
  .perf-stat-value{font-size:22px;font-weight:800;margin-top:2px;}
  .perf-stat-sub{font-size:10px;opacity:.6;}
  .perf-total{background:rgba(255,255,255,.18);}
  .perf-total .perf-stat-value{font-size:28px;}
  @media(max-width:768px){
    .perf-grid{grid-template-columns:repeat(2,1fr);}
  }

  /* ===== Kanban ===== */
  .kanban{display:grid;grid-template-columns:repeat(6,minmax(200px,1fr));gap:10px;margin-top:8px;}
  .kanban-col{background:var(--bg-kanban-col);border-radius:10px;padding:10px;min-height:240px;}
  .kanban-col-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;color:var(--gray-700);margin-bottom:10px;padding:0 4px;}
  .kanban-col-count{background:var(--bg-card);color:var(--gray-600);padding:2px 8px;border-radius:10px;font-size:11px;}
  .kanban-col[data-status="plan"] .kanban-col-head{color:var(--gray-700);}
  .kanban-col[data-status="do"] .kanban-col-head{color:var(--primary);}
  .kanban-col[data-status="check"] .kanban-col-head{color:var(--yellow);}
  .kanban-col[data-status="done"] .kanban-col-head{color:var(--green);}
  .kanban-col[data-status="hold"] .kanban-col-head{color:var(--accent);}
  .kanban-col[data-status="failed"] .kanban-col-head{color:#7C2D12;}
  .kanban-col[data-status="failed"]{background:#FEF2F2;}
  .task-card{background:var(--bg-card);border-radius:8px;padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow-sm);cursor:pointer;border-left:3px solid var(--gray-300);transition:all .15s;}
  .task-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
  .task-card[data-priority="high"]{border-left-color:var(--accent);}
  .task-card[data-priority="med"]{border-left-color:var(--yellow);}
  .task-card[data-priority="low"]{border-left-color:var(--green);}
  .task-card.is-parent{background:var(--bg-card);border:1.5px solid var(--primary);border-left-width:5px;}
  [data-theme="light"] .task-card.is-parent, :root:not([data-theme]) .task-card.is-parent{background:linear-gradient(135deg,#FFFFFF 0%,#F0F5FB 100%);}
  [data-theme="dark"] .task-card.is-parent{background:linear-gradient(135deg,#1E293B 0%,#28354A 100%);}
  .task-card.is-parent .task-title{color:var(--primary);font-weight:800;}
  [data-theme="dark"] .task-card.is-parent .task-title{color:#A7C2E8;}
  .task-card.is-child{background:var(--bg-card);border-left-style:dashed;opacity:.95;}
  [data-theme="light"] .task-card.is-child, :root:not([data-theme]) .task-card.is-child{background:#FAFBFC;}
  .task-card.is-adhoc{border:1.5px solid #7C3AED;border-left-width:5px;}
  [data-theme="light"] .task-card.is-adhoc, :root:not([data-theme]) .task-card.is-adhoc{background:linear-gradient(135deg,#FAF5FF 0%,#FFFFFF 100%);}
  [data-theme="dark"] .task-card.is-adhoc{background:linear-gradient(135deg,#3B0764 0%,#1E1B4B 100%);border-color:#A78BFA;}
  [data-theme="dark"] .task-card.is-adhoc .task-title{color:#EDE9FE;}
  [data-theme="dark"] .task-card.is-adhoc .task-meta{color:#C4B5FD;}
  [data-theme="dark"] .task-card.is-adhoc .task-tag{background:rgba(167,139,250,.25);color:#EDE9FE;border:1px solid rgba(167,139,250,.35);}
  [data-theme="dark"] .task-card.is-adhoc .task-tag.auth-L1{background:rgba(110,231,183,.2);color:#A7F3D0;}
  [data-theme="dark"] .task-card.is-adhoc .task-tag.auth-L2{background:rgba(252,211,77,.2);color:#FDE68A;}
  [data-theme="dark"] .task-card.is-adhoc .task-tag.auth-L3{background:rgba(251,146,60,.2);color:#FED7AA;}
  [data-theme="dark"] .task-card.is-adhoc .task-tag.auth-L4{background:rgba(252,165,165,.25);color:#FECACA;}
  [data-theme="dark"] .task-card.is-adhoc .dispatch-date{background:rgba(255,255,255,.15);color:#EDE9FE;}
  [data-theme="dark"] .task-card.is-adhoc .task-deadline{color:#C4B5FD;}
  [data-theme="dark"] .task-card.is-adhoc .task-deadline.overdue{color:#FCA5A5;}
  .task-card.is-silent{box-shadow:0 0 0 2px #FCA5A5;animation:silentPulse 2.4s ease-in-out infinite;}
  .task-card.is-self-created{outline:2px solid rgba(251,191,36,.5);outline-offset:-2px;}
  [data-theme="dark"] .task-card.is-self-created{outline-color:rgba(251,191,36,.7);}
  @keyframes silentPulse{0%,100%{box-shadow:0 0 0 2px rgba(252,165,165,.5);}50%{box-shadow:0 0 0 4px rgba(252,165,165,.95);}}
  .task-card{position:relative;}
  .dispatch-date{position:absolute;top:8px;right:10px;font-size:9px;font-weight:700;color:#6B7280;background:#F3F4F6;padding:2px 6px;border-radius:8px;letter-spacing:.02em;}
  [data-theme="dark"] .dispatch-date{background:#374151;color:#D1D5DB;}
  .task-card .task-title{padding-right:64px;}
  .task-title{font-weight:700;font-size:13.5px;margin:0 0 6px;color:var(--gray-800);}
  .task-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:11px;color:var(--gray-500);}
  .task-tag{display:inline-block;padding:1px 6px;border-radius:4px;background:var(--gray-100);color:var(--gray-600);font-size:10px;font-weight:600;}
  .task-tag.auth-L1{background:var(--green-light);color:var(--green);}
  .task-tag.auth-L2{background:var(--yellow-light);color:var(--yellow);}
  .task-tag.auth-L3{background:var(--orange-light);color:var(--orange);}
  .task-tag.auth-L4{background:#FCE7F3;color:#9F1239;}
  .task-deadline{margin-left:auto;}
  .task-deadline.overdue{color:var(--accent);font-weight:700;}

  /* ===== Modal ===== */
  .modal-mask{position:fixed;inset:0;background:rgba(15,52,84,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal-mask.show{display:flex;}
  .modal{background:var(--bg-card);border-radius:14px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);}

  /* ===== OGSM ===== */

  /* ===== PDCA Dashboard ===== */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--bg-card);border-radius:10px;padding:16px;box-shadow:var(--shadow-sm);}

  .stat-sub{font-size:11px;color:var(--gray-400);}
  .stat-card.plan{border-top:3px solid var(--gray-400);}
  .stat-card.do{border-top:3px solid var(--primary);}
  .stat-card.check{border-top:3px solid var(--yellow);}
  .stat-card.done{border-top:3px solid var(--green);}
  .pdca-flow{background:var(--bg-card);border-radius:12px;padding:18px;box-shadow:var(--shadow-sm);}
  .pdca-flow h3{margin:0 0 12px;font-size:14px;color:var(--gray-700);}
  .bar-track{height:14px;background:var(--gray-100);border-radius:7px;overflow:hidden;display:flex;}

  /* ===== Toast ===== */
  .toast-stack{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;max-width:90vw;}
  .toast{background:var(--gray-800);color:white;padding:10px 16px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);animation:toast-in .25s ease;}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--accent);}
  .toast.warn{background:var(--yellow);}
  @keyframes toast-in{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

  .empty-state-icon{font-size:48px;opacity:.4;margin-bottom:8px;}

  .pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:10px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--gray-400);background:transparent;transition:all .15s ease;}
  .pin-dot.filled{background:var(--primary);border-color:var(--primary);transform:scale(1.1);}
  .pin-dot.shake{animation:pinShake .35s ease;}
  @keyframes pinShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
  .pin-label{text-align:center;font-size:11.5px;color:var(--gray-500);margin-bottom:14px;}
  .pin-error{text-align:center;font-size:12px;color:var(--accent);min-height:16px;margin-bottom:6px;font-weight:600;}
  .pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:300px;margin:0 auto;}
  .pin-key{aspect-ratio:1;border-radius:50%;background:rgba(255,255,255,.85);color:#1F4E79;font-size:24px;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:all .1s ease;border:none;line-height:1;-webkit-tap-highlight-color:transparent;}

  .pwd-eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;color:var(--gray-400);font-size:16px;padding:6px 8px;line-height:1;}
  .pwd-eye:hover{color:var(--primary);}

</style>
</head>
<body>

<!-- ===== Setup Screen ===== -->

<!-- ===== App Shell ===== -->

<script>
//=========================================================================
// 任務卡佈告欄 ・ v1.9.1 雲端版
// Backend: Google Apps Script + Google Sheet
// Frontend: 本檔案（單檔 HTML，呼叫 GAS API）
//=========================================================================

const COMPANY_LABEL = { fb:'Feeling Bar', mw:'滿屋設計', npw:'凱文南坡萬' };
const COMPANY_KEYS = ['fb','mw','npw'];

const STATUS = {
  plan:   { label: '📋 計畫 Plan',  color: 'var(--gray-500)' },
  do:     { label: '🚀 執行 Do',    color: 'var(--primary)'  },
  check:  { label: '🔍 檢視 Check', color: 'var(--yellow)'   },
  done:   { label: '✅ 完成 Act',   color: 'var(--green)'    },
  hold:   { label: '⛔ 卡關 Hold',  color: 'var(--accent)'   },
  failed: { label: '❌ 失敗 Fail',  color: '#7C2D12'         },
};
const KANBAN_ORDER = ['plan','do','check','done','hold','failed'];

// 評分量表
const SCORE_LEVELS = {
  1: '1 ・ 簡單',
  2: '2 ・ 略易',
  3: '3 ・ 中等',
  4: '4 ・ 進階',
  5: '5 ・ 高階',
};
const BONUS_LEVELS = [-10,-7,-5,-3,-1,0,1,3,5,7,10];
const PRIORITY = { high:'高 ⚡', med:'中', low:'低' };
const TASK_TYPE = {
  normal:  { label:'📌 一般任務',   color:'var(--gray-600)' },
  adhoc:   { label:'⚡ 機動任務',   color:'#7C3AED' },
  project: { label:'📦 專案父任務', color:'var(--primary)' },
  subtask: { label:'↳ 子任務',      color:'var(--gray-500)' },
};
const ADHOC_SILENT_DAYS = 3;  // 機動任務 N 天無活動 → 警示
const AUTH = {
  L1: '🟢 L1 自決即報',
  L2: '🟡 L2 報備執行',
  L3: '🟠 L3 請示後行',
  L4: '🔴 L4 Kevin執行長 專斷',
};

// ===== Local persistence =====
const LS_URL    = 'cmdroom_gas_url';
const LS_TOKEN  = 'cmdroom_token';
const LS_CACHE  = 'cmdroom_cache';   // 離線快取的 STATE
const LS_LOGIN  = 'cmdroom_lastlogin'; // {company, username}
const LS_THEME  = 'cmdroom_theme';      // v1.6: 'dark' | 'light'

// v1.6：套用主題
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(LS_THEME, theme);
  const btn = document.getElementById('themeBtn');
  if (btn) { btn.textContent = theme === 'dark' ? '☀️' : '🌙'; btn.title = theme === 'dark' ? '切換到亮色' : '切換到深色'; }
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
// 首次載入即套用（預設 dark，主公指示）
(function initTheme(){
  const saved = localStorage.getItem(LS_THEME) || 'dark';
  applyTheme(saved);
})();

// ===== Global state =====
let GAS_URL = localStorage.getItem(LS_URL) || '';
let TOKEN   = localStorage.getItem(LS_TOKEN) || '';
let STATE   = null;             // server-returned init data
let currentCompany = null;
let currentPage = 'kanban';
let loginCompany = 'fb';

// Kanban 看板的篩選狀態（assignee 與 status 都用 '*' 代表全部）
let kanbanFilter = { assignee: '*', status: '*' };

// v1.4：Kanban 排序維度
let kanbanSort = 'smart';   // smart | deadline | score | priority | delay | created

// v1.7：積分表時間範圍
let scoreboardRange = 'month';   // month | quarter | year | all

// 頁面歷史堆疊（給回上一頁按鈕用）
let pageHistory = [];
let _navigatingBack = false;

//=========================================================================
// API client
//=========================================================================
async function api(action, params = {}, opts = {}) {
  if (!GAS_URL) throw new Error('尚未設定後端 URL');
  const noAuthActions = ['ping','getUserList','login','lordLogin'];
  const useGet = noAuthActions.indexOf(action) >= 0 && !opts.forcePost;

  let url = GAS_URL;
  let init = { method:'GET' };
  if (useGet && (action === 'ping' || action === 'getUserList')) {
    const qs = new URLSearchParams({ action, ...params }).toString();
    url = GAS_URL + (GAS_URL.indexOf('?')>=0?'&':'?') + qs;
  } else {
    init = {
      method: 'POST',
      // 用 text/plain 避開 CORS preflight；後端 doPost 不依賴 Content-Type
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...(TOKEN?{token:TOKEN}:{}), ...params }),
    };
  }

  showLoading(true);
  try {
    const r = await fetch(url, init);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '伺服器錯誤');
    return j.data;
  } catch (e) {
    if (e instanceof TypeError) throw new Error('連線失敗，請確認 URL 與網路');
    throw e;
  } finally {
    showLoading(false);
  }
}

function showLoading(on) {
  document.getElementById('globalLoading').classList.toggle('show', !!on);
}

//=========================================================================
// Boot
//=========================================================================
document.addEventListener('DOMContentLoaded', boot);
async function boot() {
  if (!GAS_URL) return showSetup();
  // 嘗試用既有 token 自動進入
  if (TOKEN) {
    try {
      STATE = await api('getInitData');
      cacheState();
      currentCompany = STATE.me.isLord ? 'fb' : STATE.me.company;
      enterApp();
      return;
    } catch (e) {
      TOKEN = ''; localStorage.removeItem(LS_TOKEN);
    }
  }
  showLogin();
}

//=========================================================================
// Setup screen
//=========================================================================
function showSetup() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('show');
  const s = document.getElementById('setup');
  s.classList.remove('hidden');
  document.getElementById('setupUrl').value = GAS_URL;
}
document.getElementById('setupBtn').addEventListener('click', async () => {
  const url = document.getElementById('setupUrl').value.trim();
  const err = document.getElementById('setupErr');
  err.textContent = '';
  if (!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(url)) {
    err.textContent = '網址格式不對，應是 https://script.google.com/macros/s/.../exec';
    return;
  }
  GAS_URL = url;
  try {
    const pong = await api('ping');
    if (!pong.version) throw new Error('回應格式異常');
    localStorage.setItem(LS_URL, GAS_URL);
    showToast('連線成功（v' + pong.version + '）','success');
    document.getElementById('setup').classList.add('hidden');
    showLogin();
  } catch (e) {
    err.textContent = '連線失敗：' + e.message;
  }
});

async function refreshLoginUsers() {

let pinBuffer = '';
let pinUsername = '';
let pinIsLord = false;   // 是否為 Kevin執行長 跨公司登入模式

document.getElementById('loginPickUserBtn').addEventListener('click', showPinPad);
document.getElementById('loginUser').addEventListener('change', () => {

function showPinPad(forLord) {
  const isLord = forLord === true;
  pinIsLord = isLord;
  pinBuffer = '';

  if (!isLord) {
    pinUsername = document.getElementById('loginUser').value;
    if (!pinUsername) {
      document.getElementById('loginError').textContent = '請選擇使用者';
      return;
    }
    document.getElementById('pinGreet').innerHTML = '👋 <b>' + escapeHtml(pinUsername) + '</b>，請輸入驗證碼';
  } else {
    pinUsername = 'Kevin執行長';
    document.getElementById('pinGreet').innerHTML = '⚔️ Kevin執行長 跨公司登入';
  }
  document.getElementById('pinError').textContent = '';
  renderPinDots();
  document.getElementById('loginUserSection').style.display = 'none';

  const dividerEl = document.querySelector('.login-divider');

  const reSetupEl = document.getElementById('reSetupLink');
  if (dividerEl) dividerEl.style.display = 'none';
  if (lordBtnEl) lordBtnEl.style.display = 'none';
  if (reSetupEl) reSetupEl.style.display = 'none';
  document.getElementById('loginPinSection').style.display = 'block';

function hidePinPad() {
  pinBuffer = '';
  pinIsLord = false;
  document.getElementById('loginPinSection').style.display = 'none';
  document.getElementById('loginUserSection').style.display = '';
  const dividerEl = document.querySelector('.login-divider');
  const lordBtnEl = document.getElementById('lordBtn');
  const reSetupEl = document.getElementById('reSetupLink');
  if (dividerEl) dividerEl.style.display = '';
  if (lordBtnEl) lordBtnEl.style.display = '';
  if (reSetupEl) reSetupEl.style.display = '';
}

function renderPinDots() {
  const dots = document.querySelectorAll('#pinDots .pin-dot');
  dots.forEach((d, i) => d.classList.toggle('filled', i < pinBuffer.length));
}

function pinShake() {
  const wrap = document.getElementById('pinDots');
  wrap.classList.add('shake');
  setTimeout(()=>wrap.classList.remove('shake'), 400);
}

// 鍵盤點擊
document.getElementById('pinKeypad').addEventListener('click', e => {
  const btn = e.target.closest('.pin-key');
  if (!btn) return;
  if (btn.dataset.back) {
    pinBuffer = pinBuffer.slice(0, -1);
    document.getElementById('pinError').textContent = '';
    renderPinDots();
    return;
  }
  if (!btn.dataset.digit) return;
  if (pinBuffer.length >= 6) return;
  pinBuffer += btn.dataset.digit;
  document.getElementById('pinError').textContent = '';
  renderPinDots();
  if (pinBuffer.length === 6) {
    setTimeout(tryPinLogin, 150);  // 略延遲讓最後一點 dot 動畫播完
  }
});

document.getElementById('pinBackLink').addEventListener('click', hidePinPad);

// 鍵盤實體支援
document.addEventListener('keydown', e => {
  if (document.getElementById('loginPinSection').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9' && pinBuffer.length < 6) {
    pinBuffer += e.key;
    renderPinDots();
    if (pinBuffer.length === 6) setTimeout(tryPinLogin, 150);
  } else if (e.key === 'Backspace') {
    pinBuffer = pinBuffer.slice(0, -1);
    renderPinDots();
  } else if (e.key === 'Escape') {
    hidePinPad();
  }
});

async function tryPinLogin() {
  const password = pinBuffer;
  const errEl = document.getElementById('pinError');
  errEl.textContent = '';

  try {
    if (pinIsLord) {
      const r = await api('lordLogin', { password });
      TOKEN = r.token; localStorage.setItem(LS_TOKEN, TOKEN);
      localStorage.removeItem(LS_LOGIN);
      STATE = await api('getInitData'); cacheState();
      currentCompany = 'fb';
      document.getElementById('login').classList.add('hidden');
      hidePinPad();
      enterApp();
    } else {
      const r = await api('login', { company: loginCompany, username: pinUsername, password });
      TOKEN = r.token; localStorage.setItem(LS_TOKEN, TOKEN);
      localStorage.setItem(LS_LOGIN, JSON.stringify({ company:loginCompany, username:pinUsername }));
      STATE = await api('getInitData'); cacheState();
      currentCompany = STATE.me.company;
      document.getElementById('login').classList.add('hidden');
      hidePinPad();
      enterApp();
    }
  } catch (e) {
    errEl.textContent = e.message;
    pinShake();
    pinBuffer = '';
    setTimeout(renderPinDots, 350);
  }
}

function enterApp() {
  document.getElementById('login').classList.add('hidden');

  // v1.8：isLord 顯示為「Kevin執行長」，role 為「總指揮」

  document.getElementById('topUser').textContent = displayName + '・' + roleLabel(STATE.me.role) + ((STATE.me.eligibleCompanies && STATE.me.eligibleCompanies.length>=2) ? '（可跨公司）' : '');

function roleLabel(r) {
  return ({ lord:'總指揮', admin:'管理者', manager:'店長/主管', staff:'成員' }[r]) || r;
}
function renderTopCompany() {
  const el = document.getElementById('topCompany');
  const eligible = (STATE.me.eligibleCompanies && STATE.me.eligibleCompanies.length > 0)
    ? STATE.me.eligibleCompanies

  }

// v1.5：公司切換 onChange handler
async function onCompanySwitchChange(e) {
  const target = e.target.value;
  if (!target || target === currentCompany) return;

  if (STATE.me.isLord) {
    // lord 走後端切換，會發新 token（讓 audit_log 有紀錄）
    try {
      const r = await api('switchCompany', { newCompany: target });
      TOKEN = r.token; localStorage.setItem(LS_TOKEN, TOKEN);
      STATE = await api('getInitData'); cacheState();
      currentCompany = target;
      renderSideNav();
      renderTopCompany();
      go(currentPage);
      showToast('已切換至 ' + (COMPANY_LABEL[target]||target), 'success');
    } catch (err) {
      showToast(err.message, 'error');
      e.target.value = currentCompany;
    }
    return;
  }

  // admin / manager：呼叫後端切換，換新 token
  try {
    const r = await api('switchCompany', { newCompany: target });
    TOKEN = r.token; localStorage.setItem(LS_TOKEN, TOKEN);
    STATE = await api('getInitData'); cacheState();
    currentCompany = r.user.company;
    renderSideNav();
    renderTopCompany();
    document.getElementById('topUser').textContent =
      STATE.me.username + '・' + roleLabel(STATE.me.role) + '（' + (COMPANY_LABEL[currentCompany]||currentCompany) + '）';
    go(currentPage);
    showToast('已切換至 ' + (COMPANY_LABEL[target]||target), 'success');
  } catch (err) {
    showToast(err.message, 'error');
    e.target.value = currentCompany;
  }
}
function renderSideNav() {
  const items = [
    { key:'kanban', icon:'📋', label:'任務看板' },

    { key:'pdca',   icon:'📊', label:'PDCA 儀表' },

    items.push({ key:'people', icon:'👥', label:'帳號管理' });

  if (STATE.me.isLord) items.push({ key:'ogsm', icon:'🎯', label:'OGSM 戰略表' });

  ).join('');

}
function go(page) {
  // 維護頁面歷史（非「回上一頁」操作時才 push）
  if (!_navigatingBack && pageHistory[pageHistory.length - 1] !== page) {
    pageHistory.push(page);
    if (pageHistory.length > 20) pageHistory.shift();
  }
  _navigatingBack = false;

  currentPage = page;
  document.querySelectorAll('.sidenav-item').forEach(b => b.classList.toggle('active', b.dataset.go===page));
  const m = document.getElementById('main');
  m.scrollTop = 0;
  ({
    kanban: renderKanban,
    report: renderReport,
    pdca:   renderPdca,
    people: renderPeople,
    ogsm:   renderOgsm,
    scoreboard: renderScoreboard,
    profile: renderProfile,
  }[page] || renderKanban)(m);
  refreshBackBtnState();
}

function goBack() {
  // 若 modal 開著 → 優先關 modal
  const modal = document.getElementById('modalMask');
  if (modal && modal.classList.contains('show')) {
    closeModal();
    return;
  }
  // 若 Kanban 有篩選 → 先清篩選（回到「全部」視角）
  if (currentPage === 'kanban' && (kanbanFilter.assignee !== '*' || kanbanFilter.status !== '*')) {
    kanbanFilter = { assignee:'*', status:'*' };
    go('kanban');
    return;
  }
  // 退到上一頁
  if (pageHistory.length > 1) {
    pageHistory.pop();
    _navigatingBack = true;
    go(pageHistory[pageHistory.length - 1]);
  } else {
    showToast('已在首頁', 'warn');
  }
}

function refreshBackBtnState() {
  const btn = document.getElementById('backBtn');
  if (!btn) return;
  const modal = document.getElementById('modalMask');
  const hasModal = modal && modal.classList.contains('show');
  const hasFilter = currentPage === 'kanban' && (kanbanFilter.assignee !== '*' || kanbanFilter.status !== '*');
  const canBack = hasModal || hasFilter || pageHistory.length > 1;
  btn.style.opacity = canBack ? '1' : '0.4';
  btn.style.cursor = canBack ? 'pointer' : 'default';
}
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('themeBtn').addEventListener('click', toggleTheme);
// 鍵盤快捷鍵：Esc 或 Alt+← 回上一頁

  if (e.altKey && e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

//=========================================================================
// Kanban — 任務看板
//=========================================================================
function renderKanban(m) {
  const tasks = (STATE.tasks?.[currentCompany]) || [];
  const me = STATE.me;
  const isLeader = me.isLord || ['admin','manager'].indexOf(me.role) >= 0;
  // v1.9：staff 也能自建任務（受三道防線限制）
  const canCreate = isLeader || me.role === 'staff';
  const canScore = me.isLord || me.role === 'admin';

  // 收集所有 assignee 列表（合併目前任務指派 + 帳號清單）
  const assigneeSet = new Set();
  tasks.forEach(t => { if (t.assignee) assigneeSet.add(t.assignee); });
  if (STATE.accounts && STATE.accounts[currentCompany]) {
    STATE.accounts[currentCompany].forEach(u => assigneeSet.add(u.username));
  }
  const assignees = Array.from(assigneeSet).sort();

  // 統計每位 assignee 的 done 件數（用於分頁徽章）
  const doneByAssignee = {};
  tasks.forEach(t => {
    if (t.status === 'done' && t.assignee) {
      doneByAssignee[t.assignee] = (doneByAssignee[t.assignee] || 0) + 1;
    }
  });

  // 套用篩選
  const filtered = tasks.filter(t => {
    if (kanbanFilter.assignee !== '*' && t.assignee !== kanbanFilter.assignee) return false;
    if (kanbanFilter.status !== '*' && t.status !== kanbanFilter.status) return false;
    return true;
  });
  const grouped = { plan:[], do:[], check:[], done:[], hold:[], failed:[] };
  filtered.forEach(t => { (grouped[t.status]||grouped.plan).push(t); });

  // v1.4：依排序維度排序每欄
  const today = new Date().toISOString().slice(0,10);
  const sortFn = getSortFn(kanbanSort, today);
  Object.keys(grouped).forEach(k => grouped[k].sort(sortFn));

  // v1.4：員工 tab 紅點 — 計算每位 assignee 的逾期任務數
  const overdueByAssignee = {};
  tasks.forEach(t => {
    if (t.assignee && t.deadline && t.deadline < today && t.status !== 'done' && t.status !== 'failed') {
      overdueByAssignee[t.assignee] = (overdueByAssignee[t.assignee] || 0) + 1;
    }
  });

  // v1.4：員工自己登入時的警示
  const myOverdue = me.isLord ? 0 : tasks.filter(t =>
    t.assignee === me.username && t.deadline && t.deadline < today &&
    t.status !== 'done' && t.status !== 'failed'
  ).length;

  // 員工視角下的考績摘要
  const showPerf = (kanbanFilter.assignee !== '*') && isLeader;
  const perfData = showPerf ? computeMemberScore(tasks, kanbanFilter.assignee) : null;

  // 看板 columns 順序：依篩選決定
  const colsToShow = kanbanFilter.status === '*' ? KANBAN_ORDER : [kanbanFilter.status];

  m.innerHTML = `
    <div class="page-header">
      <h2 class="page-title">任務看板</h2>
      <p class="page-sub">${COMPANY_LABEL[currentCompany]} ・ ${isLeader?'領導視角':'我的任務'} ・ 共 ${tasks.length} 件（篩選後 ${filtered.length} 件）</p>
      <div class="page-actions">
        ${canCreate?`<button class="btn btn-primary" onclick="openTaskModal()">+ 新建任務</button>`:''}
        <button class="btn btn-ghost" onclick="document.getElementById('refreshBtn').click()">🔄 重新整理</button>
        ${(kanbanFilter.assignee!=='*'||kanbanFilter.status!=='*')?`<button class="btn btn-ghost" onclick="resetKanbanFilter()">✕ 清除篩選</button>`:''}
        <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-600);">
          📊 排序：
          <select id="kanbanSortSel" style="padding:6px 8px;border:1px solid var(--gray-200);border-radius:6px;font-size:12px;">
            <option value="smart"    ${kanbanSort==='smart'?'selected':''}>🧠 智能（延誤+優先+分數）</option>
            <option value="deadline" ${kanbanSort==='deadline'?'selected':''}>⏰ 截止日（近→遠）</option>
            <option value="priority" ${kanbanSort==='priority'?'selected':''}>⚡ 優先級（高→低）</option>
            <option value="score"    ${kanbanSort==='score'?'selected':''}>★ 任務分數（高→低）</option>
            <option value="delay"    ${kanbanSort==='delay'?'selected':''}>🐢 延誤天數（多→少）</option>
            <option value="created"  ${kanbanSort==='created'?'selected':''}>📅 創建日（新→舊）</option>
          </select>
        </label>
      </div>
    </div>

    ${myOverdue > 0 ? `
      <div style="background:#FEE2E2;border-left:4px solid #C00000;border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;">
        <span style="font-size:22px;">⚠️</span>
        <div style="flex:1;">
          <div style="font-weight:800;color:#991B1B;font-size:14px;">您有 ${myOverdue} 件逾期任務</div>
          <div style="font-size:11px;color:#7C2D12;margin-top:2px;">請優先處理，必要時請告知 Kevin執行長 延期原因</div>
        </div>
        <button class="btn btn-danger" onclick="kanbanFilter.assignee='*';kanbanFilter.status='*';kanbanSort='delay';go('kanban');">先看逾期</button>
      </div>
    ` : ''}

    ${(isLeader) ? (() => {
      // v1.9：過去 7 天員工自建任務 banner（領導視角才看）
      const sevenDaysAgo = new Date(Date.now() - 7*86400000).toISOString().slice(0,10);
      const recentSelf = tasks.filter(t => t.selfCreated && iso(t.createdAt).slice(0,10) >= sevenDaysAgo);
      if (recentSelf.length === 0) return '';
      const byCreator = {};
      recentSelf.forEach(t => {
        const k = t.creator || t.assignee || '?';
        byCreator[k] = (byCreator[k]||0) + 1;
      });
      const ranked = Object.entries(byCreator).sort((a,b)=>b[1]-a[1]);
      const list = ranked.map(([n,c]) => `<b style="color:#7C5C00;">${escapeHtml(n)}</b>×${c}`).join('、');
      return `
        <div style="background:linear-gradient(135deg,#FEF3C7 0%,#FDE68A 100%);border-left:4px solid #F59E0B;border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;">
          <span style="font-size:22px;">🌟</span>
          <div style="flex:1;color:#7C2D12;">
            <div style="font-weight:800;font-size:14px;">過去 7 天有 ${recentSelf.length} 張員工自建任務</div>
            <div style="font-size:11.5px;margin-top:2px;">${list} ・ 請審視內容並補上積分</div>
          </div>
          <button class="btn btn-ghost" onclick="kanbanSort='created';kanbanFilter.assignee='*';kanbanFilter.status='*';go('kanban');" style="background:white;color:#7C2D12;border-color:#F59E0B;">查看 →</button>
        </div>
      `;
    })() : ''}

    ${isLeader ? `
      <div class="member-tabs">
        <button class="member-tab ${kanbanFilter.assignee==='*'?'active':''}" data-assignee="*">全部 <span class="badge">${tasks.length}</span></button>
        ${assignees.map(a => {

          return `
          <button class="member-tab ${kanbanFilter.assignee===a?'active':''}" data-assignee="${escapeHtml(a)}">
            ${escapeHtml(a)}${redDot} <span class="badge">${doneByAssignee[a]||0}</span>
          </button>
        `;
        }).join('')}
      </div>
    ` : ''}

    <div class="status-pills">
      <button class="status-pill ${kanbanFilter.status==='*'?'active':''}" data-status="*">全部</button>
      ${KANBAN_ORDER.map(s => `
        <button class="status-pill ${kanbanFilter.status===s?'active':''}" data-status="${s}">${STATUS[s].label}</button>
      `).join('')}
    </div>

    ${showPerf ? perfBanner(perfData) : ''}

    ${(kanbanFilter.assignee==='*' && kanbanFilter.status==='*') ? `
      <details class="help-block">
        <summary>💡 任務卡使用說明（軍師心法）</summary>

// v1.4：排序函式工廠
function getSortFn(mode, today) {
  const priorityRank = p => ({ high:0, med:1, low:2 }[p||'med']);
  const score = t => (Number(t.complexity)||0) + (Number(t.techDifficulty)||0);
  const delay = t => {
    if (t.status === 'done' || t.status === 'failed' || !t.deadline) return 0;
    if (t.deadline >= today) return 0;
    return Math.round((new Date(today) - new Date(t.deadline)) / 86400000);
  };
  const smartScore = t => {
    // 智能排序：延誤天數 × 10 + 優先級反序 × 5 + 任務分數 × 1
    return delay(t) * 10 + (2 - priorityRank(t.priority)) * 5 + score(t);
  };
  switch(mode) {
    case 'deadline':
      return (a,b) => (iso(a.deadline)||'9999').localeCompare(iso(b.deadline)||'9999');
    case 'score':
      return (a,b) => score(b) - score(a);
    case 'priority':
      return (a,b) => priorityRank(a.priority) - priorityRank(b.priority);
    case 'delay':
      return (a,b) => delay(b) - delay(a);
    case 'created':
      return (a,b) => iso(b.createdAt).localeCompare(iso(a.createdAt));
    case 'smart':
    default:
      return (a,b) => smartScore(b) - smartScore(a);
  }
}

// 計算單一員工的考績摘要
function computeMemberScore(allTasks, assignee) {
  const own = allTasks.filter(t => t.assignee === assignee);
  const done   = own.filter(t => t.status === 'done');
  const failed = own.filter(t => t.status === 'failed');
  const hold   = own.filter(t => t.status === 'hold');
  const inProgress = own.filter(t => ['plan','do','check'].indexOf(t.status)>=0);

  const sum = (arr, k) => arr.reduce((s,t) => s + (Number(t[k])||0), 0);
  const pairSum = arr => arr.reduce((s,t) => s + (Number(t.complexity)||0) + (Number(t.techDifficulty)||0), 0);

  const baseScore   = pairSum(done);
  const failScore   = pairSum(failed);
  const bonusScore  = sum(own, 'bonusPoints');
  const totalScore  = baseScore - failScore + bonusScore;

  const avgComp = done.length ? (sum(done,'complexity')/done.length).toFixed(1) : '–';
  const avgTech = done.length ? (sum(done,'techDifficulty')/done.length).toFixed(1) : '–';

  return {
    name: assignee,
    totalTasks: own.length,
    done: done.length,
    failed: failed.length,
    hold: hold.length,
    inProgress: inProgress.length,
    baseScore, failScore, bonusScore, totalScore,
    avgComp, avgTech,
  };
}

// v1.4：計算任務時效性（done 任務才有）
function computeTimeliness(t) {
  if (t.status !== 'done') return null;
  if (!t.deadline || !t.completedAt) return null;
  const done = iso(t.completedAt).slice(0,10);
  if (done < t.deadline)  return { tag:'early',  icon:'🚀 提前', bg:'#DBEAFE', color:'#1F4E79' };
  if (done === t.deadline) return { tag:'ontime', icon:'⏰ 準時', bg:'#FEF3C7', color:'#BF8F00' };
  return                          { tag:'late',   icon:'🐢 延誤', bg:'#FEE2E2', color:'#991B1B' };
}

// v1.4：計算延誤天數（未完成且過了 deadline）
function computeDelay(t, today) {
  if (t.status === 'done' || t.status === 'failed') return { days:0 };
  if (!t.deadline) return { days:0 };
  if (t.deadline >= today) return { days:0 };
  const d1 = new Date(t.deadline);
  const d2 = new Date(today);
  const days = Math.round((d2 - d1) / 86400000);
  return { days };
}

// v1.4：計算建議分數（用於採用建議按鈕）
function computeSuggestedBonus(t) {
  const tm = computeTimeliness(t);
  if (!tm) return null;
  if (tm.tag === 'early')  return { points: 2,  reason: '🚀 提前完成 (+2)' };
  if (tm.tag === 'ontime') return { points: 1,  reason: '⏰ 準時完成 (+1)' };
  // 延誤：按天數加重，最多 -10
  if (tm.tag === 'late') {
    const done = new Date(iso(t.completedAt).slice(0,10));
    const deadline = new Date(t.deadline);
    const days = Math.round((done - deadline) / 86400000);
    const weeks = Math.ceil(days / 7);
    const points = Math.max(-10, -2 * weeks);
    return { points, reason: '🐢 延誤完成 ' + days + ' 天 (' + points + ')' };
  }
  return null;
}

async function saveTask(id) {
  const get = sel => { const el = document.getElementById(sel); return el ? el.value.trim() : ''; };
  const title = get('f-title');
  if (!title) { showToast('任務名稱必填','error'); return; }
  const newNote = get('f-newnote');
  const task = {
    id: id || '',
    company: currentCompany,
    title,
    why:        get('f-why'),
    doneLook:   get('f-done'),
    redLines:   get('f-red'),
    deadline:   get('f-deadline'),
    midCheck:   get('f-mid'),
    assignee:   get('f-assignee'),
    priority:   get('f-priority'),
    authLevel:  get('f-auth'),
    status:     get('f-status'),
  };
  // 評分欄位（僅 admin/lord 看得到欄位，後端也會做雙重防禦）
  if (document.getElementById('f-complexity')) {
    task.complexity     = Number(get('f-complexity')) || 0;
    task.techDifficulty = Number(get('f-techDifficulty')) || 0;
    task.bonusPoints    = Number(get('f-bonusPoints')) || 0;
    task.bonusReason    = get('f-bonusReason');
  }
  // v1.4：父子任務欄位
  if (document.getElementById('f-parent')) {
    task.parentTaskId = get('f-parent');
  }
  if (document.getElementById('f-projectKPI')) {
    task.projectKPI = get('f-projectKPI');
    task.isParent   = !!task.projectKPI;
  }
  // v1.6：任務類型 + 附檔
  const tt = document.querySelector('input[name="f-taskType"]:checked');
  if (tt) task.taskType = tt.value;
  // v1.7：協作人員
  task.collaborators = Array.from(document.querySelectorAll('input[name="f-collaborator"]:checked')).map(c => c.value);
  // 父任務 / 子任務的 type 由後端自動推斷，前端無需強制
  if (task.parentTaskId) task.taskType = 'subtask';
  if (task.isParent || task.projectKPI) task.taskType = 'project';
  // 附檔資料（在 step 3 補上）
  if (window._pendingAttachments) {
    task.attachments = window._pendingAttachments;
  }
  if (newNote) task.notes = [{ at:new Date().toISOString(), by:STATE.me.username, text:newNote }];

  try {
    await api('saveTask', { task });
    STATE = await api('getInitData'); cacheState();
    closeModal();
    go('kanban');
    showToast(id?'已儲存':'已建立任務','success');
  } catch (e) {
    showToast(e.message,'error');
  }
}
async function deleteTask(id) {
  if (!confirm('確定刪除此任務？無法復原。')) return;
  try {
    await api('deleteTask', { company: currentCompany, taskId: id });
    STATE = await api('getInitData'); cacheState();
    closeModal();
    go('kanban');
    showToast('已刪除','warn');
  } catch (e) {
    showToast(e.message,'error');
  }
}

// v1.6：渲染任務時間軸（合併 statusHistory + notes，按時間排序）
function renderTaskTimeline(task) {
  const events = [];
  // 建立事件
  events.push({
    at: task.createdAt || '',
    by: task.creator || '',
    type: 'created',
    text: '🎬 任務建立 ・ 派發給 ' + (task.assignee || '未指派'),
  });
  // 狀態變更事件
  (task.statusHistory||[]).forEach((h, i) => {
    if (i === 0 && !h.fromStatus) return;  // 跳過種子的第一筆（已由 created 涵蓋）
    const from = (STATUS[h.fromStatus]||{}).label || h.fromStatus || '(無)';
    const to = (STATUS[h.toStatus]||{}).label || h.toStatus;
    events.push({
      at: h.at, by: h.by, type: 'status',
      text: '🔄 ' + from + ' → ' + to,
    });
  });
  // 進度紀錄事件
  (task.notes||[]).forEach(n => {
    events.push({
      at: n.at, by: n.by, type: 'note',
      text: '💬 ' + (n.text || ''),
    });
  });
  // 排序
  events.sort((a,b) => iso(a.at).localeCompare(iso(b.at)));

  // 計算間隔（看是不是「臨時抱佛腳」）
  const dates = events.map(e => iso(e.at).slice(0,10)).filter(Boolean);
  const uniqueDates = Array.from(new Set(dates));
  const activeDays = uniqueDates.length;
  const totalDays = task.createdAt && task.completedAt
    ? Math.max(1, Math.round((new Date(task.completedAt) - new Date(task.createdAt))/86400000))
    : (task.createdAt
       ? Math.max(1, Math.round((new Date() - new Date(task.createdAt))/86400000))
       : 1);
  const engagementPct = Math.round(activeDays/totalDays*100);
  const engagementLabel = engagementPct >= 60 ? '🟢 持續投入'
                        : engagementPct >= 30 ? '🟡 階段性投入'
                        : '🔴 臨時抱佛腳傾向';

  return `
    <div style="margin-bottom:8px;padding:8px;background:white;border-radius:6px;font-size:11px;color:var(--gray-600);">
      <b>工作節奏觀察</b>：${totalDays} 天內有活動的天數 = ${activeDays} 天（${engagementPct}%）　${engagementLabel}
    </div>
    ${events.map(ev => `
      <div style="padding:5px 0;border-bottom:1px dashed var(--gray-200);">
        <span style="color:var(--gray-400);font-family:monospace;font-size:10px;">${iso(ev.at).slice(0,16).replace('T',' ')}</span>
        <span style="color:var(--gray-500);margin-left:6px;">${escapeHtml(ev.by||'')}</span>
        <div style="margin-top:2px;">${escapeHtml(ev.text)}</div>
      </div>
    `).join('')}
  `;
}

async function handlePhotoUpload(e) {

// 用 Canvas 把圖片縮到 maxWidth，回傳 base64 dataUrl
function resizeImageToDataUrl(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('影像解碼失敗'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('讀取檔案失敗'));
    reader.readAsDataURL(file);
  });
}

}

function ogsmStrategyRow(s={}) {

function ogsmMeasureRow(m={}) {

function ogsmAdd(section) {

            : section==='strategies' ? ogsmStrategyRow()

}
async function saveOgsm() {
  const ogsm = {
    objective:  document.getElementById('o-obj').value.trim(),
    goals:      readOgsmRows('o-goals',      ['name','current','target','deadline']),
    strategies: readOgsmRows('o-strategies', ['name','description','owner']),
    measures:   readOgsmRows('o-measures',   ['name','current','target','owner']),
  };
  try {
    await api('saveOgsm', { company: currentCompany, ogsm });
    STATE = await api('getInitData'); cacheState();
    showToast('OGSM 已儲存','success');
    go('ogsm');
  } catch (e) {
    showToast(e.message,'error');
  }
}
function readOgsmRows(id, keys) {
  const rows = document.getElementById(id).children;
  return Array.from(rows).map(row => {
    const obj = {};
    keys.forEach(k => {
      const inp = row.querySelector(`[data-k="${k}"]`);
      obj[k] = inp ? inp.value.trim() : '';
    });
    return obj;
  }).filter(o => Object.values(o).some(v => v));
}

//=========================================================================
// Scoreboard 積分表（主公限定）
//=========================================================================
function renderScoreboard(m) {
  if (!STATE.me.isLord) {
    m.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔒</div>積分表為 Kevin執行長 限定</div>`;
    return;
  }
  const company = currentCompany;
  const allTasks = (STATE.tasks?.[company]) || [];

  // 時間範圍過濾（依 completedAt 或 createdAt）
  const now = new Date();
  let cutoff = null;
  if (scoreboardRange === 'month') cutoff = new Date(now.getFullYear(), now.getMonth(), 1);
  else if (scoreboardRange === 'quarter') cutoff = new Date(now.getFullYear(), Math.floor(now.getMonth()/3)*3, 1);
  else if (scoreboardRange === 'year') cutoff = new Date(now.getFullYear(), 0, 1);
  const cutoffISO = cutoff ? cutoff.toISOString().slice(0,10) : '';

  const inRange = t => {
    if (!cutoffISO) return true;
    const dt = iso(t.completedAt || t.createdAt).slice(0,10);
    return dt >= cutoffISO;
  };
  const tasks = allTasks.filter(inRange);

  // 計算每位成員的積分
  // 規則：主負責人拿全分；協作者拿 50%
  const accounts = (STATE.accounts && STATE.accounts[company]) || [];
  const allMembers = new Set();
  accounts.forEach(u => allMembers.add(u.username));
  tasks.forEach(t => { if (t.assignee) allMembers.add(t.assignee); });

  const stats = {};
  allMembers.forEach(name => {
    stats[name] = {
      name, done:0, failed:0, total:0,
      baseScore:0, failScore:0, bonusScore:0, totalScore:0,
      collabDone:0, collabScore:0,   // 作為協作者得到的分數
      selfCreated:0,                  // v1.9：自建任務數（主動性指標）
    };
  });

  tasks.forEach(t => {
    const score = (Number(t.complexity)||0) + (Number(t.techDifficulty)||0);
    const bonus = Number(t.bonusPoints)||0;
    const main = t.assignee;
    if (main && stats[main]) {
      stats[main].total++;
      if (t.status === 'done') {
        stats[main].done++;
        stats[main].baseScore += score;
      } else if (t.status === 'failed') {
        stats[main].failed++;
        stats[main].failScore += score;
      }
      stats[main].bonusScore += bonus;
      // v1.9：自建貢獻（從 creator 算，避免 assignee 與 creator 不同的邊界情況）
      if (t.selfCreated && t.creator && stats[t.creator]) {
        stats[t.creator].selfCreated++;
      }
    }
    // 協作者拿 50%
    if (Array.isArray(t.collaborators)) {
      t.collaborators.forEach(c => {
        if (!stats[c]) return;
        if (t.status === 'done') {
          stats[c].collabDone++;
          stats[c].collabScore += Math.round(score * 0.5);
        }
      });
    }
  });
  Object.values(stats).forEach(s => {
    s.totalScore = s.baseScore - s.failScore + s.bonusScore + s.collabScore;
  });

  const ranked = Object.values(stats)
    .filter(s => s.name && s.name !== 'Kevin執行長' && s.name !== '主公')
    .sort((a,b) => b.totalScore - a.totalScore);

  const medal = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '・';

  const rangeLabel = {month:'本月', quarter:'本季', year:'本年', all:'全部'}[scoreboardRange];

  m.innerHTML = `
    <div class="page-header">
      <h2 class="page-title">🏆 下屬積分表</h2>
      <p class="page-sub">${COMPANY_LABEL[company]} ・ ${rangeLabel} ・ Kevin執行長 限定 ・ 本月最佳員工挑選依據</p>
      <div class="page-actions" style="margin-top:10px;">
        ${['month','quarter','year','all'].map(r => `
          <button class="btn ${scoreboardRange===r?'btn-primary':'btn-ghost'}" onclick="scoreboardRange='${r}';go('scoreboard');">
            ${ {month:'本月', quarter:'本季', year:'本年', all:'全部'}[r] }
          </button>
        `).join('')}
      </div>
    </div>

    <details class="help-block">
      <summary>💡 積分規則（軍師心法）</summary>
      <div style="margin-top:6px;line-height:1.7;">
        <b>基礎分</b>：每完成一張 Done 任務 = 複雜度 + 技術度（最高 5+5=10）<br>
        <b>失敗扣分</b>：每張 Failed 任務扣 (複雜度 + 技術度) 分<br>
        <b>指揮加減分</b>：時效性建議分 + Kevin執行長 手動微調（−10~+10）<br>
        <b>協作貢獻</b>：被列為協作者的 Done 任務，獲得主負責人分數的 50%<br>
        <b>總分公式 = 基礎分 − 失敗扣分 + 加減分 + 協作貢獻分</b>
      </div>
    </details>

    ${ranked.length === 0 ? `<div class="empty-state"><div class="empty-state-icon">📊</div>${rangeLabel}尚無資料</div>` : `
    <div style="background:white;border-radius:12px;box-shadow:var(--shadow-sm);overflow:hidden;">
      <div style="display:grid;grid-template-columns:50px 1.3fr 60px 60px 70px 70px 70px 80px 90px;padding:10px 14px;background:var(--gray-100);font-weight:700;font-size:11px;color:var(--gray-600);text-transform:uppercase;letter-spacing:.02em;">
        <div>排名</div><div>下屬</div><div>完成</div><div>失敗</div><div>基礎分</div><div>協作分</div><div>🌟 自建</div><div>加減</div><div style="text-align:right;">🏆 總分</div>
      </div>
      ${ranked.map((s,i) => {
        const isTop3 = i < 3;
        return `
        <div style="display:grid;grid-template-columns:50px 1.3fr 60px 60px 70px 70px 70px 80px 90px;padding:14px;border-top:1px solid var(--gray-100);font-size:13.5px;align-items:center;${isTop3?'background:linear-gradient(90deg,#FEF3C7 0%,transparent 60%);':''}">
          <div style="font-size:20px;">${medal(i)}</div>
          <div><b style="font-size:14px;">${escapeHtml(s.name)}</b><div style="font-size:10px;color:var(--gray-500);">${s.total} 件任務</div></div>
          <div style="color:var(--green);font-weight:700;">${s.done}</div>
          <div style="color:var(--accent);font-weight:${s.failed>0?'700':'400'};">${s.failed}</div>
          <div style="color:var(--primary);">+${s.baseScore}</div>
          <div style="color:#6B21A8;">+${s.collabScore}<div style="font-size:9px;color:var(--gray-400);">${s.collabDone}件</div></div>
          <div style="color:#B45309;font-weight:${s.selfCreated>0?'700':'400'};">🌟 ${s.selfCreated}</div>
          <div style="color:${s.bonusScore<0?'var(--accent)':s.bonusScore>0?'var(--green)':'var(--gray-500)'};">${s.bonusScore>=0?'+':''}${s.bonusScore}</div>
          <div style="text-align:right;font-size:20px;font-weight:800;color:${s.totalScore>=0?'var(--primary)':'var(--accent)'};">${s.totalScore>=0?'+':''}${s.totalScore}</div>
        </div>
      `;}).join('')}
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--gray-500);text-align:right;">🌟 自建欄位代表員工主動建卡數，是「主動性」量化指標</div>
    `}
  `;
}

  const o = document.getElementById('p-old').value;
  const n = document.getElementById('p-new').value;
  const n2 = document.getElementById('p-new2').value;
  if (!o || !n) { showToast('請填寫舊／新密碼','error'); return; }

  if (n.length < 4) { showToast('新密碼至少 4 碼','error'); return; }
  try {
    await api('changeMyPassword', { oldPassword:o, newPassword:n });
    showToast('密碼已變更，請以新密碼重新登入','success');
    setTimeout(() => document.getElementById('logoutBtn').click(), 1500);
  } catch (e) {
    showToast(e.message,'error');

}

//=========================================================================
// Helpers
//=========================================================================
// v1.9.1：把任何時間值（Date 物件 / ISO 字串 / null / undefined）統一轉成 ISO 字串
// 解決舊版後端傳回 Date 物件導致前端 .slice 炸錯的問題
function iso(v) {
  if (v === undefined || v === null || v === '') return '';
  if (v instanceof Date) return v.toISOString();
  if (typeof v === 'string') return v;
  if (typeof v === 'number') return new Date(v).toISOString();
  // 物件且有可能是 Date 序列化後變成奇怪格式
  try { return new Date(v).toISOString(); } catch (e) { return ''; }
}

function escapeHtml(s) {
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
}
function currentWeekId(d=new Date()) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  const wk = Math.ceil(((dt - yearStart)/86400000 + 1)/7);
  return `${dt.getUTCFullYear()}-W${String(wk).padStart(2,'0')}`;
}
function isEvenWeek(weekId) {
  const wk = parseInt(weekId.split('W')[1] || '0', 10);
  return wk % 2 === 0;
}
function avgCycleDays(tasks) {
  const completed = tasks.filter(t => t.status==='done' && t.createdAt && t.completedAt);
  if (!completed.length) return '–';
  const days = completed.reduce((sum,t) => sum + (new Date(t.completedAt) - new Date(t.createdAt))/86400000, 0) / completed.length;
  return days.toFixed(1);
}

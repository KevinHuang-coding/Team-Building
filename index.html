<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>任務卡佈告欄</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231F4E79'/%3E%3Ctext x='32' y='44' font-size='32' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold' font-size='28'%3E任務%3C/text%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  :root{
    /* === 品牌色（亮暗共用） === */
    --primary:#1F4E79; --primary-dark:#0F3454; --primary-light:#D9E2F3;
    --accent:#C00000; --green:#548235; --green-light:#E2EFDA;
    --yellow:#BF8F00; --yellow-light:#FFF2CC;
    --orange:#C65911; --orange-light:#FBE5D6;
    /* === Light mode 預設 === */
    --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB;
    --gray-300:#D1D5DB; --gray-400:#9CA3AF; --gray-500:#6B7280;
    --gray-600:#4B5563; --gray-700:#374151; --gray-800:#1F2937;
    --bg-page:#F9FAFB; --bg-card:#FFFFFF; --bg-sidenav:#FFFFFF;
    --bg-modal:#FFFFFF; --bg-kanban-col:#F3F4F6;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
    --shadow:0 2px 6px rgba(0,0,0,.08);
    --shadow-lg:0 8px 24px rgba(0,0,0,.12);
    --radius:10px;
  }
  /* === Dark mode 覆蓋 === */
  [data-theme="dark"]{
    --primary-light:#1E3A5F;
    --green-light:#1F3528;
    --yellow-light:#3D2E12;
    --orange-light:#3D2516;
    /* 反向 gray 系列：50 變深、800 變淺 */
    --gray-50:#0F172A;
    --gray-100:#1E293B;
    --gray-200:#334155;
    --gray-300:#475569;
    --gray-400:#64748B;
    --gray-500:#94A3B8;
    --gray-600:#CBD5E1;
    --gray-700:#E2E8F0;
    --gray-800:#F1F5F9;
    /* 區塊背景 */
    --bg-page:#0F172A;
    --bg-card:#1E293B;
    --bg-sidenav:#1E293B;
    --bg-modal:#1E293B;
    --bg-kanban-col:#0B1220;
    /* 深色陰影改為較強 */
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 2px 6px rgba(0,0,0,.4);
    --shadow-lg:0 8px 24px rgba(0,0,0,.6);
  }

  /* ===== v1.7.1 Dark mode 全域對比強化（一次解決所有盲點） ===== */
  /* 1. select 的原生 <option> 在 dark mode 強制深底白字（瀏覽器原本是白底） */
  [data-theme="dark"] select option,
  [data-theme="dark"] select optgroup{
    background:#1E293B !important;
    color:#F1F5F9 !important;
  }
  /* 2. topbar 內的公司切換下拉（inline style 蓋過 var，這裡用更高優先級覆蓋） */
  [data-theme="dark"] #lordCompanySwitch{
    background:#0F3454 !important;
    border-color:rgba(167,194,232,.5) !important;
    color:#F1F5F9 !important;
  }
  [data-theme="dark"] #lordCompanySwitch option{
    background:#1E293B !important;
    color:#F1F5F9 !important;
  }
  /* 3. loading mask 在 dark mode 改為深色透明（原本是半透明白會閃） */
  [data-theme="dark"] #globalLoading{
    background:rgba(15,23,42,.75) !important;
  }
  /* 4. modal 標題 / body / foot 全部吃 dark 變數 */
  [data-theme="dark"] .modal{background:var(--bg-modal);}
  [data-theme="dark"] .modal-head{background:var(--bg-modal);border-color:var(--gray-200);}
  [data-theme="dark"] .modal-foot{background:var(--gray-100);border-color:var(--gray-200);}
  [data-theme="dark"] .modal-title{color:var(--gray-800);}
  [data-theme="dark"] .modal-close{color:var(--gray-500);}
  [data-theme="dark"] .modal-close:hover{color:var(--gray-800);}
  /* 5. 所有 input / textarea / select 統一 dark 視覺 */
  [data-theme="dark"] .field-input,
  [data-theme="dark"] .field-select,
  [data-theme="dark"] .field-textarea,
  [data-theme="dark"] .form-input,
  [data-theme="dark"] .form-select{
    background:var(--bg-card);
    color:var(--gray-800);
    border-color:var(--gray-200);
  }
  [data-theme="dark"] .field-input::placeholder,
  [data-theme="dark"] .field-textarea::placeholder,
  [data-theme="dark"] .form-input::placeholder{color:var(--gray-500);}
  /* 6. 帳號管理頁的密碼 cell（inline style 用 var(--gray-700) 在 dark 下變淺，加強） */
  [data-theme="dark"] .pwd-cell{color:#F1F5F9;}
  /* 7. 按鈕 ghost 變體（白底在 dark 下難看） */
  [data-theme="dark"] .btn-ghost{background:var(--bg-card);color:var(--gray-700);border-color:var(--gray-200);}
  [data-theme="dark"] .btn-ghost:hover{background:var(--gray-100);}
  /* 8. 卡片內所有 task-tag（除已有專用樣式者）改強對比 */
  [data-theme="dark"] .task-tag{background:var(--gray-100);color:var(--gray-700);}
  [data-theme="dark"] .task-meta{color:var(--gray-600);}
  /* 9. PDCA 儀表 stat-card 在 dark 下白底改深 */
  [data-theme="dark"] .stat-card{background:var(--bg-card);}
  [data-theme="dark"] .stat-value{color:var(--gray-800);}
  /* 10. 員工 tab、status pill 在 dark 下白底太亮 */
  [data-theme="dark"] .member-tab{color:var(--gray-600);}
  [data-theme="dark"] .member-tab:hover{background:var(--gray-100);}
  [data-theme="dark"] .member-tab .badge{background:var(--bg-card);color:var(--gray-700);}
  [data-theme="dark"] .status-pill{background:var(--bg-card);color:var(--gray-700);border-color:var(--gray-200);}
  /* 11. 報告卡 / OGSM 卡 / 帳號管理表格在 dark 下白底改深 */
  [data-theme="dark"] .report-card{background:var(--bg-card);}
  [data-theme="dark"] .ogsm-block{background:var(--bg-card);}
  [data-theme="dark"] .pdca-flow{background:var(--bg-card);}
  /* 12. 帳號管理橫條與表格 row 統一 */
  [data-theme="dark"] [style*="background:white"]{background:var(--bg-card) !important;}
  [data-theme="dark"] [style*="background:#F3F4F6"]{background:var(--gray-100) !important;}
  [data-theme="dark"] [style*="background:#FFF8DC"]{background:#3D2E12 !important;color:#FDE68A !important;}
  /* 13. 詳情頁淺色背景塊（field-row、進度紀錄、子任務列表等）強化 */
  [data-theme="dark"] [style*="background:var(--gray-50)"]{background:var(--gray-100) !important;}
  /* 14. dispatch-date 在 dark 下白色背景太亮 */
  [data-theme="dark"] .dispatch-date{background:var(--gray-100);color:var(--gray-600);}
  /* 15. 關閉橫幅、警示橫幅在 dark 下調整 */
  [data-theme="dark"] [style*="background:#FEE2E2"]{background:#3F1D1D !important;color:#FCA5A5 !important;}
  [data-theme="dark"] [style*="background:#FEF3C7"]{background:#3D2E12 !important;color:#FDE68A !important;}
  [data-theme="dark"] [style*="background:#DBEAFE"]{background:#1E3A5F !important;color:#A7C2E8 !important;}
  [data-theme="dark"] [style*="background:#E2EFDA"]{background:#1F3528 !important;color:#86EFAC !important;}
  [data-theme="dark"] [style*="background:#FBE5D6"]{background:#3D2516 !important;color:#FED7AA !important;}
  /* v2.1：進度回報區塊背景（hardcoded #FAFBFF 在 dark 下變深底以拉對比）*/
  [data-theme="dark"] [style*="background:#FAFBFF"]{background:var(--gray-100) !important;}
  /* v2.1：field-hint 在 dark 下對比強化（原 --gray-400 太暗）*/
  [data-theme="dark"] .field-hint{color:var(--gray-500);}
  /* v2.1：details summary 在 dark 下字色加亮 */
  [data-theme="dark"] details summary{color:var(--gray-700) !important;}

  /* ===== v2.3 Dark mode 對比批量強化（品牌色／強調色當文字在深色背景過暗）===== */
  [data-theme="dark"] [style*="color:var(--primary)"]{color:#8FB4DD !important;}
  [data-theme="dark"] [style*="color:#1F4E79"]{color:#8FB4DD !important;}
  [data-theme="dark"] [style*="color:var(--accent)"]{color:#F87171 !important;}
  [data-theme="dark"] [style*="color:#C00000"]{color:#F87171 !important;}
  [data-theme="dark"] [style*="color:var(--green)"]{color:#5FD68A !important;}
  [data-theme="dark"] [style*="color:var(--yellow)"]{color:#E8C04A !important;}
  [data-theme="dark"] [style*="color:var(--orange)"]{color:#F0945A !important;}
  [data-theme="dark"] [style*="color:#059669"]{color:#34D399 !important;}
  [data-theme="dark"] [style*="color:#D97706"]{color:#FBBF24 !important;}
  [data-theme="dark"] [style*="background:#F8FAFC"]{background:var(--gray-100) !important;}
  [data-theme="dark"] .kanban-col[data-status="failed"]{background:#2E1A1A !important;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",-apple-system,sans-serif;background:var(--bg-page);color:var(--gray-800);font-size:14px;line-height:1.55;transition:background-color .2s, color .2s;width:100%;max-width:100%;overflow-x:hidden;}
  body{min-width:0;-webkit-text-size-adjust:100%;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;}
  input,textarea,select{font-family:inherit;font-size:14px;}
  textarea{resize:vertical;min-height:60px;}
  .hidden{display:none!important;}

  /* ===== 全域載入 ===== */
  #globalLoading{position:fixed;inset:0;background:rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;z-index:1000;}
  #globalLoading.show{display:flex;}
  .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== Setup / Login 共用容器 ===== */
  .center-wrap{min-height:100vh;background:linear-gradient(135deg,#1F4E79 0%,#0F3454 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
  .center-card{background:var(--bg-card);border-radius:16px;padding:32px 28px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);}
  .center-title{text-align:center;margin:0 0 4px;color:var(--primary);font-size:22px;font-weight:800;letter-spacing:.05em;}
  .center-sub{text-align:center;color:var(--gray-500);font-size:12px;margin-bottom:24px;}

  .company-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:20px;background:var(--gray-100);padding:4px;border-radius:10px;}
  .company-tab{padding:10px 8px;border-radius:7px;font-size:13px;font-weight:600;color:var(--gray-600);transition:all .2s;}
  .company-tab.active{background:var(--bg-card);color:var(--primary);box-shadow:var(--shadow-sm);}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:12px;color:var(--gray-600);margin-bottom:6px;font-weight:600;}
  .form-input,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:8px;background:var(--bg-card);color:var(--gray-800);}
  .form-input:focus,.form-select:focus{outline:none;border-color:var(--primary);}
  .login-btn{width:100%;padding:12px;background:var(--primary);color:white;border-radius:8px;font-weight:700;font-size:15px;margin-top:8px;transition:background .2s;}
  .login-btn:hover{background:var(--primary-dark);}
  .login-btn:disabled{background:var(--gray-300);cursor:not-allowed;}
  .err-msg{color:var(--accent);font-size:12px;text-align:center;margin-top:10px;min-height:14px;}
  .login-divider{display:flex;align-items:center;color:var(--gray-400);margin:18px 0;font-size:11px;}
  .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--gray-200);}
  .login-divider span{padding:0 10px;}
  .lord-btn{width:100%;padding:10px;background:#F4E5C5;color:#7C5C00;border:1.5px dashed #BF8F00;border-radius:8px;font-weight:700;font-size:13px;}
  .lord-btn:hover{background:#EFD9A8;}
  .small-link{font-size:11px;color:var(--gray-400);display:block;text-align:center;margin-top:14px;cursor:pointer;}
  .small-link:hover{color:var(--primary);}

  /* ===== App Shell ===== */
  #app{min-height:100vh;display:none;}
  #app.show{display:flex;flex-direction:column;}
  .topbar{background:var(--primary);color:white;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);}
  .topbar-brand{font-weight:800;font-size:15px;letter-spacing:.04em;}
  .topbar-company{background:rgba(255,255,255,.18);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;}
  .topbar-spacer{flex:1;}
  .topbar-user{font-size:12px;opacity:.85;}
  .topbar-btn{padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.12);font-size:12px;font-weight:600;color:white;}
  .topbar-btn:hover{background:rgba(255,255,255,.22);}

  .layout{flex:1;display:flex;}
  .sidenav{width:200px;background:var(--bg-card);border-right:1px solid var(--gray-200);padding:14px 8px;display:flex;flex-direction:column;gap:4px;}
  .sidenav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-weight:600;color:var(--gray-700);text-align:left;font-size:13.5px;}
  .sidenav-item:hover{background:var(--gray-100);}
  .sidenav-item.active{background:var(--primary-light);color:var(--primary);}
  .sidenav-item .icon{width:20px;text-align:center;font-size:15px;}

  .main{flex:1;padding:20px 24px;overflow-y:auto;max-width:100%;}
  .page-header{margin-bottom:20px;}
  .page-title{font-size:22px;font-weight:800;color:var(--gray-800);margin:0 0 4px;}
  .page-sub{font-size:13px;color:var(--gray-500);margin:0;}
  .page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;}
  .btn{padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
  .btn-primary{background:var(--primary);color:white;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-ghost{background:var(--bg-card);color:var(--gray-700);border:1px solid var(--gray-200);}
  .btn-ghost:hover{background:var(--gray-100);}
  .btn-danger{background:#FEE2E2;color:#991B1B;}
  .btn-danger:hover{background:#FECACA;}

  /* ===== Member tabs ===== */
  .member-tabs{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 10px;padding:6px;background:var(--gray-100);border-radius:10px;overflow-x:auto;}
  .member-tab{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:600;color:var(--gray-600);white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
  .member-tab:hover{background:var(--bg-card);}
  .member-tab.active{background:var(--primary);color:white;box-shadow:var(--shadow-sm);}
  .member-tab .badge{background:rgba(255,255,255,.25);color:inherit;padding:1px 6px;border-radius:8px;font-size:10px;}
  .member-tab:not(.active) .badge{background:var(--bg-card);}

  /* ===== Status filter pills ===== */
  .status-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .status-pill{padding:5px 11px;border-radius:14px;font-size:12px;font-weight:600;background:var(--bg-card);color:var(--gray-600);border:1.5px solid var(--gray-200);}
  .status-pill:hover{border-color:var(--primary-light);}
  .status-pill.active{background:var(--primary);color:white;border-color:var(--primary);}

  /* ===== Performance summary banner ===== */
  .perf-banner{background:linear-gradient(135deg,#1F4E79,#2D5F8E);color:white;border-radius:12px;padding:16px 20px;margin-bottom:14px;box-shadow:var(--shadow);}
  .perf-banner h3{margin:0 0 4px;font-size:16px;font-weight:800;}
  .perf-banner-sub{font-size:11px;opacity:.75;margin-bottom:12px;}
  .perf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .perf-stat{background:rgba(255,255,255,.1);border-radius:8px;padding:10px;}
  .perf-stat-label{font-size:10px;opacity:.75;font-weight:700;letter-spacing:.04em;}
  .perf-stat-value{font-size:22px;font-weight:800;margin-top:2px;}
  .perf-stat-sub{font-size:10px;opacity:.6;}
  .perf-total{background:rgba(255,255,255,.18);}
  .perf-total .perf-stat-value{font-size:28px;}
  @media(max-width:768px){
    .perf-grid{grid-template-columns:repeat(2,1fr);}
  }
  /* 考績總覽收折 */
  .perf-banner-wrap{margin-bottom:14px;}
  .perf-banner-summary{display:flex;align-items:center;cursor:pointer;background:linear-gradient(135deg,#1F4E79,#2D5F8E);color:white;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:800;list-style:none;box-shadow:var(--shadow);user-select:none;}
  .perf-banner-summary::-webkit-details-marker{display:none;}
  .perf-banner-wrap[open]>.perf-banner-summary{border-radius:12px 12px 0 0;}
  .perf-banner-wrap>.perf-banner{margin-top:0;border-radius:0 0 12px 12px;}

  /* ===== Kanban ===== */
  .kanban{display:grid;grid-template-columns:repeat(6,minmax(200px,1fr));gap:10px;margin-top:8px;}
  .kanban-col{background:var(--bg-kanban-col);border-radius:10px;padding:10px;min-height:240px;}
  .kanban-col-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;color:var(--gray-700);margin-bottom:10px;padding:0 4px;}
  .kanban-col-count{background:var(--bg-card);color:var(--gray-600);padding:2px 8px;border-radius:10px;font-size:11px;}
  /* v2.4 sticky 欄位標題列 */
  .kanban-sticky-bar{position:sticky;top:0;z-index:10;display:grid;grid-template-columns:repeat(6,minmax(200px,1fr));gap:10px;background:var(--bg-page);padding:6px 0 4px;}
  .kanban-sticky-bar .kanban-col-head{margin-bottom:0;background:var(--bg-kanban-col);border-radius:10px;padding:8px 14px;}
  .kanban-col[data-status="plan"] .kanban-col-head{color:var(--gray-700);}
  .kanban-col[data-status="do"] .kanban-col-head{color:var(--primary);}
  .kanban-col[data-status="check"] .kanban-col-head{color:var(--yellow);}
  .kanban-col[data-status="done"] .kanban-col-head{color:var(--green);}
  .kanban-col[data-status="hold"] .kanban-col-head{color:var(--accent);}
  .kanban-col[data-status="failed"] .kanban-col-head{color:#7C2D12;}
  .kanban-col[data-status="failed"]{background:#FEF2F2;}
  .task-card{background:var(--bg-card);border-radius:8px;padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow-sm);cursor:pointer;border-left:3px solid var(--gray-300);transition:all .15s;}
  .task-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
  .task-card[data-priority="high"]{border-left-color:var(--accent);}
  .task-card[data-priority="med"]{border-left-color:var(--yellow);}
  .task-card[data-priority="low"]{border-left-color:var(--green);}
  .task-card.is-parent{background:var(--bg-card);border:1.5px solid var(--primary);border-left-width:5px;}
  [data-theme="light"] .task-card.is-parent, :root:not([data-theme]) .task-card.is-parent{background:linear-gradient(135deg,#FFFFFF 0%,#F0F5FB 100%);}
  [data-theme="dark"] .task-card.is-parent{background:linear-gradient(135deg,#1E293B 0%,#28354A 100%);}
  .task-card.is-parent .task-title{color:var(--primary);font-weight:800;}
  [data-theme="dark"] .task-card.is-parent .task-title{color:#A7C2E8;}
  .task-card.is-child{background:var(--bg-card);border-left-style:dashed;opacity:.95;}
  [data-theme="light"] .task-card.is-child, :root:not([data-theme]) .task-card.is-child{background:#FAFBFC;}
  .task-card.is-adhoc{border:1.5px solid #7C3AED;border-left-width:5px;}
  [data-theme="light"] .task-card.is-adhoc, :root:not([data-theme]) .task-card.is-adhoc{background:linear-gradient(135deg,#FAF5FF 0%,#FFFFFF 100%);}
  [data-theme="dark"] .task-card.is-adhoc{background:linear-gradient(135deg,#3B0764 0%,#1E1B4B 100%);border-color:#A78BFA;}
  [data-theme="dark"] .task-card.is-adhoc .task-title{color:#EDE9FE;}
  [data-theme="dark"] .task-card.is-adhoc .task-meta{color:#C4B5FD;}
  [data-theme="dark"] .task-card.is-adhoc .task-tag{background:rgba(167,139,250,.25);color:#EDE9FE;border:1px solid rgba(167,139,250,.35);}
  [data-theme="dark"] .task-card.is-adhoc .task-tag.auth-L1{background:rgba(110,231,183,.2);color:#A7F3D0;}
  [data-theme="dark"] .task-card.is-adhoc .task-tag.auth-L2{background:rgba(252,211,77,.2);color:#FDE68A;}
  [data-theme="dark"] .task-card.is-adhoc .task-tag.auth-L3{background:rgba(251,146,60,.2);color:#FED7AA;}
  [data-theme="dark"] .task-card.is-adhoc .task-tag.auth-L4{background:rgba(252,165,165,.25);color:#FECACA;}
  [data-theme="dark"] .task-card.is-adhoc .dispatch-date{background:rgba(255,255,255,.15);color:#EDE9FE;}
  [data-theme="dark"] .task-card.is-adhoc .task-deadline{color:#C4B5FD;}
  [data-theme="dark"] .task-card.is-adhoc .task-deadline.overdue{color:#FCA5A5;}
  .task-card.is-silent{box-shadow:0 0 0 2px #FCA5A5;animation:silentPulse 2.4s ease-in-out infinite;}
  .task-card.is-self-created{outline:2px solid rgba(251,191,36,.5);outline-offset:-2px;}
  [data-theme="dark"] .task-card.is-self-created{outline-color:rgba(251,191,36,.7);}
  @keyframes silentPulse{0%,100%{box-shadow:0 0 0 2px rgba(252,165,165,.5);}50%{box-shadow:0 0 0 4px rgba(252,165,165,.95);}}
  .task-card{position:relative;}
  .dispatch-date{position:absolute;top:8px;right:10px;font-size:9px;font-weight:700;color:#6B7280;background:#F3F4F6;padding:2px 6px;border-radius:8px;letter-spacing:.02em;}
  [data-theme="dark"] .dispatch-date{background:#374151;color:#D1D5DB;}
  .task-card .task-title{padding-right:64px;}
  .task-title{font-weight:700;font-size:13.5px;margin:0 0 6px;color:var(--gray-800);}
  .task-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:11px;color:var(--gray-500);}
  .task-tag{display:inline-block;padding:1px 6px;border-radius:4px;background:var(--gray-100);color:var(--gray-600);font-size:10px;font-weight:600;}
  .task-tag.auth-L1{background:var(--green-light);color:var(--green);}
  .task-tag.auth-L2{background:var(--yellow-light);color:var(--yellow);}
  .task-tag.auth-L3{background:var(--orange-light);color:var(--orange);}
  .task-tag.auth-L4{background:#FCE7F3;color:#9F1239;}
  .task-deadline{margin-left:auto;}
  .task-deadline.overdue{color:var(--accent);font-weight:700;}

  /* ===== Modal ===== */
  .modal-mask{position:fixed;inset:0;background:rgba(15,52,84,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal-mask.show{display:flex;}
  .modal{background:var(--bg-card);border-radius:14px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg-card);z-index:1;}
  .modal-title{font-size:17px;font-weight:800;margin:0;color:var(--gray-800);}
  .modal-close{font-size:22px;color:var(--gray-400);padding:0 4px;}
  .modal-close:hover{color:var(--gray-700);}
  .modal-body{padding:18px 22px;}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:8px;background:var(--gray-50);}

  .field{margin-bottom:14px;}
  .field-label{display:block;font-size:12px;color:var(--gray-600);font-weight:700;margin-bottom:5px;}
  .field-label .req{color:var(--accent);}
  .field-hint{font-size:11px;color:var(--gray-400);margin-top:4px;}
  .field-input,.field-select,.field-textarea{width:100%;padding:9px 11px;border:1.5px solid var(--gray-200);border-radius:7px;background:var(--bg-card);color:var(--gray-800);}
  .field-input:focus,.field-select:focus,.field-textarea:focus{outline:none;border-color:var(--primary);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

  /* ===== Weekly Report ===== */
  .report-card{background:var(--bg-card);border-radius:12px;padding:20px;box-shadow:var(--shadow-sm);margin-bottom:14px;}
  .report-section{margin-bottom:16px;}
  .report-section-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .report-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;}
  .report-icon.done{background:var(--green);}
  .report-icon.block{background:var(--accent);}
  .report-icon.next{background:var(--primary);}
  .report-icon.decide{background:var(--yellow);}
  .report-icon.mood{background:var(--gray-500);}
  .report-section-title{font-weight:700;font-size:14px;color:var(--gray-800);}
  .related-tasks{background:var(--orange-light);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--gray-700);}
  .related-tasks-title{font-weight:700;color:var(--orange);margin-bottom:4px;font-size:11px;}

  /* ===== OGSM ===== */
  .ogsm-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  .ogsm-block{background:var(--bg-card);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow-sm);border-left:4px solid var(--primary);}
  .ogsm-block h3{margin:0 0 8px;font-size:15px;color:var(--primary);font-weight:800;display:flex;align-items:center;gap:8px;}
  .ogsm-block h3 .letter{background:var(--primary);color:white;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .ogsm-row{display:grid;grid-template-columns:1fr 90px 90px 110px;gap:8px;padding:8px 0;border-bottom:1px dashed var(--gray-200);align-items:center;font-size:12.5px;}
  .ogsm-row.head{font-weight:700;color:var(--gray-500);font-size:11px;border-bottom:2px solid var(--gray-300);}
  .ogsm-row:last-child{border-bottom:none;}

  /* ===== PDCA Dashboard ===== */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--bg-card);border-radius:10px;padding:16px;box-shadow:var(--shadow-sm);}
  .stat-label{font-size:11px;color:var(--gray-500);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .stat-value{font-size:26px;font-weight:800;color:var(--gray-800);margin:4px 0;}
  .stat-sub{font-size:11px;color:var(--gray-400);}
  .stat-card.plan{border-top:3px solid var(--gray-400);}
  .stat-card.do{border-top:3px solid var(--primary);}
  .stat-card.check{border-top:3px solid var(--yellow);}
  .stat-card.done{border-top:3px solid var(--green);}
  .pdca-flow{background:var(--bg-card);border-radius:12px;padding:18px;box-shadow:var(--shadow-sm);}
  .pdca-flow h3{margin:0 0 12px;font-size:14px;color:var(--gray-700);}
  .bar-track{height:14px;background:var(--gray-100);border-radius:7px;overflow:hidden;display:flex;}

  /* ===== Toast ===== */
  .toast-stack{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;max-width:90vw;}
  .toast{background:var(--gray-800);color:white;padding:10px 16px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);animation:toast-in .25s ease;}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--accent);}
  .toast.warn{background:var(--yellow);}
  @keyframes toast-in{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

  /* ===== Mobile ===== */
  @media (max-width:768px){
    .layout{flex-direction:column;}
    .sidenav{width:100%;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--gray-200);padding:8px;gap:4px;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;}
    .sidenav-item{flex-shrink:0;padding:8px 12px;font-size:12.5px;}
    .main{padding:12px;}
    .kanban{grid-template-columns:1fr;gap:8px;}
    .stat-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
    .stat-card{padding:12px;}
    .stat-value{font-size:22px;}
    .field-row,.field-row-3{grid-template-columns:1fr;}
    .ogsm-row{grid-template-columns:1fr;gap:4px;}
    .ogsm-row.head{display:none;}
    .topbar{padding:8px 10px;gap:6px;}
    .topbar-brand{font-size:13px;letter-spacing:0;}
    .topbar-user{display:none;}
    .topbar-company{font-size:11px;padding:3px 6px;}
    .topbar-btn{padding:5px 8px;font-size:11px;}
    .page-title{font-size:18px;}
    .page-sub{font-size:12px;}
    .modal-mask{padding:8px;}
    .modal-head,.modal-body,.modal-foot{padding:12px 14px;}
    .modal-title{font-size:15px;}
    .member-tabs{padding:4px;gap:4px;-webkit-overflow-scrolling:touch;}
    .member-tab{padding:5px 9px;font-size:11.5px;}
    .status-pills{gap:4px;}
    .status-pill{padding:4px 9px;font-size:11px;}
    .perf-grid{grid-template-columns:repeat(2,1fr);}
    .task-card{padding:10px;}
    .dispatch-date{font-size:8.5px;top:6px;right:6px;}
    /* 積分表小螢幕簡化欄位 */
    #scoreboardTable, #scoreboardTable > div{grid-template-columns:40px 1.2fr 60px 60px 90px !important;}
    #scoreboardTable .col-fail, #scoreboardTable .col-base, #scoreboardTable .col-collab, #scoreboardTable .col-bonus{display:none;}
  }
  @media (max-width:380px){
    .stat-grid{grid-template-columns:1fr;}
    .topbar-brand{display:none;}
  }

  .empty-state{text-align:center;padding:40px 20px;color:var(--gray-400);font-size:13px;}
  .empty-state-icon{font-size:48px;opacity:.4;margin-bottom:8px;}

  details.help-block{background:var(--primary-light);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--gray-700);}
  details.help-block summary{cursor:pointer;font-weight:700;color:var(--primary);}
  details.help-block[open] summary{margin-bottom:8px;}

  .conn-banner{background:var(--yellow-light);border-bottom:1px solid var(--yellow);padding:6px 14px;font-size:12px;color:var(--gray-700);text-align:center;}

  /* ===== v1.8 iPhone 風格 PIN 鍵盤 ===== */
  .pin-section{padding:8px 0 4px;}
  .pin-greet{text-align:center;font-size:14px;color:var(--gray-700);margin-bottom:14px;font-weight:600;}
  .pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:10px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--gray-400);background:transparent;transition:all .15s ease;}
  .pin-dot.filled{background:var(--primary);border-color:var(--primary);transform:scale(1.1);}
  .pin-dot.shake{animation:pinShake .35s ease;}
  @keyframes pinShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
  .pin-label{text-align:center;font-size:11.5px;color:var(--gray-500);margin-bottom:14px;}
  .pin-error{text-align:center;font-size:12px;color:var(--accent);min-height:16px;margin-bottom:6px;font-weight:600;}
  .pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:300px;margin:0 auto;}
  .pin-key{aspect-ratio:1;border-radius:50%;background:rgba(255,255,255,.85);color:#1F4E79;font-size:24px;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:all .1s ease;border:none;line-height:1;-webkit-tap-highlight-color:transparent;}
  [data-theme="dark"] .pin-key{background:rgba(255,255,255,.12);color:#F1F5F9;}
  .pin-key:active{transform:scale(.92);background:rgba(255,255,255,.6);}
  [data-theme="dark"] .pin-key:active{background:rgba(255,255,255,.25);}
  .pin-key-sub{font-size:9px;font-weight:600;letter-spacing:.12em;color:var(--gray-500);margin-top:2px;}
  [data-theme="dark"] .pin-key-sub{color:rgba(255,255,255,.55);}
  .pin-key.pin-back{background:transparent;font-size:22px;}
  [data-theme="dark"] .pin-key.pin-back{background:transparent;}
  .pin-key-empty{visibility:hidden;}
  .pin-back-link{display:block;text-align:center;font-size:12px;color:var(--gray-500);margin-top:18px;cursor:pointer;}
  .pin-back-link:hover{color:var(--primary);}

  /* ===== Password input with eye toggle ===== */
  .pwd-wrap{position:relative;}
  .pwd-wrap input{padding-right:42px!important;}
  .pwd-eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;color:var(--gray-400);font-size:16px;padding:6px 8px;line-height:1;}
  .pwd-eye:hover{color:var(--primary);}
  .pwd-eye:focus{outline:none;color:var(--primary);}

  /* ===== v2.5：客戶開發甘特圖 ===== */
  .gantt-wrap{overflow-x:auto;border:1px solid var(--gray-200);border-radius:10px;background:var(--bg-card);position:relative;max-height:72vh;}
  .gantt-head{position:sticky;top:0;z-index:5;background:var(--bg-card);border-bottom:1px solid var(--gray-200);}
  .gantt-label-col{position:sticky;left:0;z-index:6;background:var(--bg-card);border-right:1px solid var(--gray-200);min-width:210px;max-width:210px;box-sizing:border-box;}
  .gantt-day{display:inline-block;width:26px;flex:none;text-align:center;font-size:11px;color:var(--gray-500);border-left:1px solid var(--gray-100);box-sizing:border-box;}
  .gantt-day.weekend{background:rgba(192,0,0,.08);}
  .gantt-day.today{box-shadow:inset 2px 0 0 var(--accent);font-weight:800;color:var(--accent);}
  .gantt-col{position:absolute;top:0;bottom:0;border-left:1px solid var(--gray-100);box-sizing:border-box;pointer-events:none;}
  .gantt-col.weekend{background:rgba(192,0,0,.08);}
  .gantt-col.today{box-shadow:inset 2px 0 0 var(--accent);}
  .gantt-row{display:flex;align-items:center;height:40px;border-bottom:1px solid var(--gray-100);cursor:pointer;}
  .gantt-row:hover .gantt-label-col{background:var(--gray-50);}
  .gantt-bar{position:absolute;height:24px;border-radius:6px;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:11px;font-weight:600;overflow:hidden;white-space:nowrap;z-index:2;box-shadow:0 1px 2px rgba(0,0,0,.15);}
  .gantt-group-head{display:flex;align-items:center;gap:8px;padding:8px 12px;font-weight:800;font-size:13px;background:var(--gray-50);position:sticky;left:0;z-index:4;border-bottom:1px solid var(--gray-200);}
  .gantt-fbtn{padding:4px 10px;font-size:12px;border:1px solid var(--gray-200);background:var(--bg-card);color:var(--gray-500);border-radius:999px;cursor:pointer;}
  .gantt-fbtn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  [data-theme="dark"] .gantt-day.weekend,[data-theme="dark"] .gantt-col.weekend{background:rgba(192,0,0,.18);}
  [data-theme="dark"] .gantt-label-col,[data-theme="dark"] .gantt-head{background:var(--bg-card);}

  /* ===== v2.6：月/週/日目標（主公專屬） ===== */
  .goal-period-card{background:var(--bg-card);border:1px solid var(--gray-200);border-radius:12px;padding:16px 18px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .goal-period-head{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--primary);margin-bottom:14px;}
  .goal-period-head .pk{margin-left:8px;font-size:12px;font-weight:600;color:var(--gray-500);background:var(--gray-100);padding:2px 8px;border-radius:6px;}
  /* v2.11：公司名置頂橫向、目標列吃滿整寬（不再被左側 170px 直欄吃掉空間） */
  /* v2.12：三家公司目標區塊各自底色卡片化（南坡萬粉綠／滿屋粉黃／Feeling Bar 粉紅） */
  .goal-co-block{display:flex;flex-direction:column;align-items:stretch;gap:6px;padding:10px 14px;border-radius:10px;margin-bottom:10px;}
  .goal-co-block:last-of-type{margin-bottom:0;}
  .goal-co-block[data-company="npw"]{background:#e7f6ec;}   /* 南坡萬 粉綠 */
  .goal-co-block[data-company="mw"] {background:#fdf6e0;}   /* 滿屋 粉黃 */
  .goal-co-block[data-company="fb"] {background:#fdeaf0;}   /* Feeling Bar 粉紅 */
  [data-theme="dark"] .goal-co-block[data-company="npw"]{background:rgba(16,185,129,.14);}
  [data-theme="dark"] .goal-co-block[data-company="mw"] {background:rgba(234,179,8,.14);}
  [data-theme="dark"] .goal-co-block[data-company="fb"] {background:rgba(236,72,153,.14);}
  .goal-co-name{width:100%;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--gray-700);padding-top:0;}
  .goal-add-co{margin-left:auto;}
  .goal-co-name .co-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .goal-rows{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
  .goal-row{display:flex;align-items:center;gap:8px;}
  .goal-done-dot{width:18px;height:18px;flex:none;border-radius:50%;border:2px solid var(--primary);background:transparent;cursor:pointer;transition:.15s;position:relative;padding:0;}
  .goal-done-dot.done{background:var(--primary);}
  .goal-done-dot.done::after{content:"✓";position:absolute;inset:0;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:800;}
  .goal-input{flex:1;min-width:100px;padding:7px 10px;border:1px solid var(--gray-200);border-radius:8px;font-size:13.5px;font-family:inherit;background:var(--bg-card);color:var(--gray-800);}
  .goal-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light);}
  .goal-row.done .goal-input{text-decoration:line-through;color:var(--gray-500);background:var(--gray-100);}
  .goal-emp-select{flex:none;width:88px;padding:7px 6px;border:1px solid var(--gray-200);border-radius:8px;font-size:12.5px;font-family:inherit;background:var(--gray-50);color:var(--gray-700);}
  .goal-emp-select:focus{outline:none;border-color:var(--primary);}
  .goal-btn-add{width:26px;height:26px;flex:none;border:none;border-radius:7px;background:var(--primary);color:#fff;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .goal-btn-add:hover{background:var(--primary-dark);}
  .goal-btn-del{width:26px;height:26px;flex:none;border:1px solid var(--gray-200);border-radius:7px;background:var(--bg-card);color:var(--gray-400);font-size:15px;cursor:pointer;}
  .goal-btn-del:hover{color:var(--accent);border-color:var(--accent);}
  .goal-btn-link{flex:none;border:1px solid var(--primary);border-radius:7px;background:var(--primary-light);color:var(--primary);font-size:12px;font-weight:700;padding:5px 9px;cursor:pointer;white-space:nowrap;}
  .goal-btn-link:hover{background:var(--primary);color:#fff;}
  .goal-btn-link.linked{background:#dcfce7;border-color:#16a34a;color:#15803d;}
  .goal-legend{font-size:12px;color:var(--gray-500);margin-top:6px;display:flex;gap:16px;flex-wrap:wrap;}
  .goal-legend b{color:var(--gray-700);}
  .goal-card-picker{margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:4px 8px;border:1px solid var(--gray-200);border-radius:8px;background:var(--gray-50);}
  .goal-date-input{border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--gray-800);cursor:pointer;}
  .goal-date-input:focus{outline:none;}
  .goal-mini-today{border:1px solid var(--gray-200);background:var(--bg-card);color:var(--gray-600);font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;cursor:pointer;}
  .goal-mini-today:hover:not(:disabled){border-color:var(--primary);color:var(--primary);}
  .goal-mini-today:disabled{opacity:.45;cursor:default;}
  [data-theme="dark"] .goal-card-picker{background:var(--gray-100);border-color:var(--gray-200);}
  [data-theme="dark"] .goal-date-input{color:#F1F5F9;}
  [data-theme="dark"] .goal-date-input::-webkit-calendar-picker-indicator{filter:invert(1);}
  [data-theme="dark"] .goal-mini-today{background:var(--bg-card);color:var(--gray-500);}
  /* v2.9：每日目標三欄並排（明天/今天/昨天） */
  .goal-day-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;}
  .goal-day-col{border:1px solid var(--gray-200);border-radius:10px;padding:8px 10px;background:var(--gray-50);min-width:0;}
  .goal-day-col-head{font-size:13px;font-weight:700;color:var(--primary);padding:2px 2px 8px;border-bottom:1px dashed var(--gray-200);margin-bottom:8px;}
  .goal-day-col .goal-co-block{flex-direction:column;align-items:stretch;gap:5px;padding:8px 10px;margin-bottom:8px;}
  .goal-day-col .goal-co-name{width:100%;padding-top:0;font-size:13px;}
  .goal-day-col .goal-rows{width:100%;}
  .goal-day-col .goal-row{flex-wrap:wrap;}
  .goal-day-col .goal-input{flex:1 1 120px;min-width:90px;}
  .goal-day-col .goal-emp-select{width:88px;}

<!-- ===== App Shell ===== -->

<div class="toast-stack" id="toastStack"></div>
<div id="globalLoading"><div class="spinner"></div></div>

<script>
//=========================================================================
// 任務卡佈告欄 ・ v2.5 雲端版（客戶開發甘特圖頁面 + bizDev 分類欄位）
// Backend: Google Apps Script + Google Sheet
// Frontend: 本檔案（單檔 HTML，呼叫 GAS API）
//=========================================================================

const COMPANY_LABEL = { fb:'Feeling Bar', mw:'滿屋設計', npw:'凱文南坡萬' };
const COMPANY_KEYS = ['fb','mw','npw'];

const STATUS = {
  plan:   { label: '📋 計畫 Plan',  color: 'var(--gray-500)' },
  do:     { label: '🚀 執行 Do',    color: 'var(--primary)'  },
  check:  { label: '🔍 檢視 Check', color: 'var(--yellow)'   },
  done:   { label: '✅ 完成 Act',   color: 'var(--green)'    },
  hold:   { label: '⛔ 卡關 Hold',  color: 'var(--accent)'   },
  failed: { label: '❌ 失敗 Fail',  color: '#7C2D12'         },
};
const KANBAN_ORDER = ['plan','do','check','done','hold','failed'];

// 評分量表
const SCORE_LEVELS = {
  1: '1 ・ 簡單',
  2: '2 ・ 略易',
  3: '3 ・ 中等',
  4: '4 ・ 進階',
  5: '5 ・ 高階',
};
const BONUS_LEVELS = [-10,-7,-5,-3,-1,0,1,3,5,7,10];
const PRIORITY = { high:'高 ⚡', med:'中', low:'低' };
const TASK_TYPE = {
  normal:  { label:'📌 一般任務',   color:'var(--gray-600)' },
  adhoc:   { label:'⚡ 機動任務',   color:'#7C3AED' },
  project: { label:'📦 專案父任務', color:'var(--primary)' },
  subtask: { label:'↳ 子任務',      color:'var(--gray-500)' },
};
const ADHOC_SILENT_DAYS = 3;  // 機動任務 N 天無活動 → 警示
const AUTH = {
  L1: '🟢 L1 自決即報',
  L2: '🟡 L2 報備執行',
  L3: '🟠 L3 請示後行',
  L4: '🔴 L4 Kevin執行長 專斷',
};

// ===== Local persistence =====
const LS_URL    = 'cmdroom_gas_url';
const LS_TOKEN  = 'cmdroom_token';
const LS_CACHE  = 'cmdroom_cache';   // 離線快取的 STATE
const LS_LOGIN  = 'cmdroom_lastlogin'; // {company, username}
const LS_THEME  = 'cmdroom_theme';      // v1.6: 'dark' | 'light'

// v1.6：套用主題
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(LS_THEME, theme);
  const btn = document.getElementById('themeBtn');
  if (btn) { btn.textContent = theme === 'dark' ? '☀️' : '🌙'; btn.title = theme === 'dark' ? '切換到亮色' : '切換到深色'; }
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
// 首次載入即套用（預設 dark，主公指示）
(function initTheme(){
  const saved = localStorage.getItem(LS_THEME) || 'dark';
  applyTheme(saved);
})();

// ===== Global state =====
let GAS_URL = localStorage.getItem(LS_URL) || '';
let TOKEN   = localStorage.getItem(LS_TOKEN) || '';
let STATE   = null;             // server-returned init data
let currentCompany = null;
let currentPage = 'kanban';
let loginCompany = 'fb';

// Kanban 看板的篩選狀態（assignee 與 status 都用 '*' 代表全部）
let kanbanFilter = { assignee: '*', status: '*' };

// v1.4：Kanban 排序維度
let kanbanSort = 'smart';   // smart | deadline | score | priority | delay | created

// v1.7：積分表時間範圍
let scoreboardRange = 'month';   // month | quarter | year | all

// 頁面歷史堆疊（給回上一頁按鈕用）
let pageHistory = [];
let _navigatingBack = false;

//=========================================================================
// API client
//=========================================================================
async function api(action, params = {}, opts = {}) {
  if (!GAS_URL) throw new Error('尚未設定後端 URL');
  const noAuthActions = ['ping','getUserList','login','lordLogin'];
  const useGet = noAuthActions.indexOf(action) >= 0 && !opts.forcePost;

  let url = GAS_URL;
  let init = { method:'GET' };
  if (useGet && (action === 'ping' || action === 'getUserList')) {
    const qs = new URLSearchParams({ action, ...params }).toString();
    url = GAS_URL + (GAS_URL.indexOf('?')>=0?'&':'?') + qs;
  } else {
    init = {
      method: 'POST',
      // 用 text/plain 避開 CORS preflight；後端 doPost 不依賴 Content-Type
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...(TOKEN?{token:TOKEN}:{}), ...params }),
    };
  }

  showLoading(true);
  try {
    const r = await fetch(url, init);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '伺服器錯誤');
    return j.data;
  } catch (e) {
    if (e instanceof TypeError) throw new Error('連線失敗，請確認 URL 與網路');
    throw e;
  } finally {
    showLoading(false);
  }
}

function showLoading(on) {
  document.getElementById('globalLoading').classList.toggle('show', !!on);
}

//=========================================================================
// Boot
//=========================================================================
document.addEventListener('DOMContentLoaded', boot);
async function boot() {
  if (!GAS_URL) return showSetup();
  // 嘗試用既有 token 自動進入
  if (TOKEN) {
    try {
      STATE = await api('getInitData');
      cacheState();
      currentCompany = STATE.me.isLord ? 'fb' : STATE.me.company;
      enterApp();
      return;
    } catch (e) {
      TOKEN = ''; localStorage.removeItem(LS_TOKEN);
    }
  }
  showLogin();
}

//=========================================================================
// Setup screen
//=========================================================================
function showSetup() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('show');
  const s = document.getElementById('setup');
  s.classList.remove('hidden');
  document.getElementById('setupUrl').value = GAS_URL;
}
document.getElementById('setupBtn').addEventListener('click', async () => {
  const url = document.getElementById('setupUrl').value.trim();
  const err = document.getElementById('setupErr');
  err.textContent = '';
  if (!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(url)) {
    err.textContent = '網址格式不對，應是 https://script.google.com/macros/s/.../exec';
    return;
  }
  GAS_URL = url;
  try {
    const pong = await api('ping');
    if (!pong.version) throw new Error('回應格式異常');
    localStorage.setItem(LS_URL, GAS_URL);
    showToast('連線成功（v' + pong.version + '）','success');
    document.getElementById('setup').classList.add('hidden');
    showLogin();
  } catch (e) {
    err.textContent = '連線失敗：' + e.message;
  }
});

//=========================================================================
// Login screen
//=========================================================================
async function showLogin() {
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('app').classList.remove('show');
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('loginError').textContent = '';
  hidePinPad();   // v1.8：確保回到使用者選擇模式
  // 還原上次選擇
  try {
    const last = JSON.parse(localStorage.getItem(LS_LOGIN) || '{}');
    if (last.company && COMPANY_KEYS.indexOf(last.company)>=0) {
      loginCompany = last.company;
      document.querySelectorAll('.company-tab').forEach(b => b.classList.toggle('active', b.dataset.company===loginCompany));
    }
  } catch (e) {}
  await refreshLoginUsers();
}
document.querySelectorAll('.company-tab').forEach(btn => {
  btn.addEventListener('click', async () => {
    document.querySelectorAll('.company-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loginCompany = btn.dataset.company;
    document.getElementById('loginError').textContent = '';
    await refreshLoginUsers();
  });
});
async function refreshLoginUsers() {
  const sel = document.getElementById('loginUser');
  try {
    const users = await api('getUserList', { company: loginCompany });
    sel.innerHTML = users.map(u => `<option value="${escapeHtml(u.username)}">${escapeHtml(u.username)}</option>`).join('');
    // 還原上次帳號
    try {
      const last = JSON.parse(localStorage.getItem(LS_LOGIN) || '{}');
      if (last.username && last.company === loginCompany) sel.value = last.username;
    } catch (e) {}
  } catch (e) {
    sel.innerHTML = `<option value="">（${escapeHtml(e.message)}）</option>`;
  }
}
// v1.8 PIN 鍵盤狀態
let pinBuffer = '';
let pinUsername = '';
let pinIsLord = false;   // 是否為 Kevin執行長 跨公司登入模式

document.getElementById('loginPickUserBtn').addEventListener('click', showPinPad);
document.getElementById('loginUser').addEventListener('change', () => {
  document.getElementById('loginError').textContent = '';
});

function showPinPad(forLord) {
  const isLord = forLord === true;
  pinIsLord = isLord;
  pinBuffer = '';

  if (!isLord) {
    pinUsername = document.getElementById('loginUser').value;
    if (!pinUsername) {
      document.getElementById('loginError').textContent = '請選擇使用者';
      return;
    }
    document.getElementById('pinGreet').innerHTML = '👋 <b>' + escapeHtml(pinUsername) + '</b>，請輸入驗證碼';
  } else {
    pinUsername = 'Kevin執行長';
    document.getElementById('pinGreet').innerHTML = '⚔️ Kevin執行長 跨公司登入';
  }
  document.getElementById('pinError').textContent = '';
  renderPinDots();
  document.getElementById('loginUserSection').style.display = 'none';
  // 主公專屬登入 OR 一般登入時都隱藏「OR + 跨公司登入按鈕」
  const dividerEl = document.querySelector('.login-divider');
  const lordBtnEl = document.getElementById('lordBtn');
  const reSetupEl = document.getElementById('reSetupLink');
  if (dividerEl) dividerEl.style.display = 'none';
  if (lordBtnEl) lordBtnEl.style.display = 'none';
  if (reSetupEl) reSetupEl.style.display = 'none';
  document.getElementById('loginPinSection').style.display = 'block';
}

function hidePinPad() {
  pinBuffer = '';
  pinIsLord = false;
  document.getElementById('loginPinSection').style.display = 'none';
  document.getElementById('loginUserSection').style.display = '';
  const dividerEl = document.querySelector('.login-divider');
  const lordBtnEl = document.getElementById('lordBtn');
  const reSetupEl = document.getElementById('reSetupLink');
  if (dividerEl) dividerEl.style.display = '';
  if (lordBtnEl) lordBtnEl.style.display = '';
  if (reSetupEl) reSetupEl.style.display = '';
}

function renderPinDots() {
  const dots = document.querySelectorAll('#pinDots .pin-dot');
  dots.forEach((d, i) => d.classList.toggle('filled', i < pinBuffer.length));
}

function pinShake() {
  const wrap = document.getElementById('pinDots');
  wrap.classList.add('shake');
  setTimeout(()=>wrap.classList.remove('shake'), 400);
}

// 鍵盤點擊
document.getElementById('pinKeypad').addEventListener('click', e => {
  const btn = e.target.closest('.pin-key');
  if (!btn) return;
  if (btn.dataset.back) {
    pinBuffer = pinBuffer.slice(0, -1);
    document.getElementById('pinError').textContent = '';
    renderPinDots();
    return;
  }
  if (!btn.dataset.digit) return;
  if (pinBuffer.length >= 6) return;
  pinBuffer += btn.dataset.digit;
  document.getElementById('pinError').textContent = '';
  renderPinDots();
  if (pinBuffer.length === 6) {
    setTimeout(tryPinLogin, 150);  // 略延遲讓最後一點 dot 動畫播完
  }
});

document.getElementById('pinBackLink').addEventListener('click', hidePinPad);

// 鍵盤實體支援
document.addEventListener('keydown', e => {
  if (document.getElementById('loginPinSection').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9' && pinBuffer.length < 6) {
    pinBuffer += e.key;
    renderPinDots();
    if (pinBuffer.length === 6) setTimeout(tryPinLogin, 150);
  } else if (e.key === 'Backspace') {
    pinBuffer = pinBuffer.slice(0, -1);
    renderPinDots();
  } else if (e.key === 'Escape') {
    hidePinPad();
  }
});

async function tryPinLogin() {
  const password = pinBuffer;
  const errEl = document.getElementById('pinError');
  errEl.textContent = '';

  try {
    if (pinIsLord) {
      const r = await api('lordLogin', { password });
      TOKEN = r.token; localStorage.setItem(LS_TOKEN, TOKEN);
      localStorage.removeItem(LS_LOGIN);
      STATE = await api('getInitData'); cacheState();
      currentCompany = 'fb';
      document.getElementById('login').classList.add('hidden');
      hidePinPad();
      enterApp();
    } else {
      const r = await api('login', { company: loginCompany, username: pinUsername, password });
      TOKEN = r.token; localStorage.setItem(LS_TOKEN, TOKEN);
      localStorage.setItem(LS_LOGIN, JSON.stringify({ company:loginCompany, username:pinUsername }));
      STATE = await api('getInitData'); cacheState();
      currentCompany = STATE.me.company;
      document.getElementById('login').classList.add('hidden');
      hidePinPad();
      enterApp();
    }
  } catch (e) {
    errEl.textContent = e.message;
    pinShake();
    pinBuffer = '';
    setTimeout(renderPinDots, 350);
  }
}
// v1.8：跨公司登入也走 PIN 鍵盤模式（不再用 prompt）
document.getElementById('lordBtn').addEventListener('click', () => {
  showPinPad(true);
});
document.getElementById('reSetupLink').addEventListener('click', showSetup);

//=========================================================================
// Cache
//=========================================================================
function cacheState() {
  try { localStorage.setItem(LS_CACHE, JSON.stringify(STATE)); } catch(e) {}
}

//=========================================================================
// App Shell
//=========================================================================
function enterApp() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('app').classList.add('show');
  // v1.8：isLord 顯示為「Kevin執行長」，role 為「總指揮」
  const displayName = STATE.me.isLord ? 'Kevin執行長' : STATE.me.username;
  document.getElementById('topUser').textContent = displayName + '・' + roleLabel(STATE.me.role) + ((STATE.me.eligibleCompanies && STATE.me.eligibleCompanies.length>=2) ? '（可跨公司）' : '');
  renderTopCompany();
  renderSideNav();
  go('kanban');
}
function roleLabel(r) {
  return ({ lord:'總指揮', admin:'管理者', manager:'店長/主管', staff:'成員' }[r]) || r;
}
function renderTopCompany() {
  const el = document.getElementById('topCompany');
  const eligible = (STATE.me.eligibleCompanies && STATE.me.eligibleCompanies.length > 0)
    ? STATE.me.eligibleCompanies
    : [STATE.me.company];

  // v1.5：lord 或可跨多家公司的 admin / manager 都顯示下拉
  if (STATE.me.isLord || eligible.length >= 2) {
    const options = (STATE.me.isLord ? COMPANY_KEYS : eligible)
      .map(k => `<option value="${k}" ${currentCompany===k?'selected':''}>${COMPANY_LABEL[k]||k}</option>`)
      .join('');
    el.innerHTML = `<select id="lordCompanySwitch" title="切換公司視角" style="background:transparent;border:1px solid rgba(255,255,255,.4);border-radius:5px;color:white;padding:2px 6px;font-size:12px;cursor:pointer;">
      ${options}
    </select>`;
    document.getElementById('lordCompanySwitch').addEventListener('change', onCompanySwitchChange);
  } else {
    el.textContent = COMPANY_LABEL[currentCompany];
  }
}

// v1.5：公司切換 onChange handler
async function onCompanySwitchChange(e) {
  const target = e.target.value;
  if (!target || target === currentCompany) return;

  if (STATE.me.isLord) {
    // lord 走後端切換，會發新 token（讓 audit_log 有紀錄）
    try {
      const r = await api('switchCompany', { newCompany: target });
      TOKEN = r.token; localStorage.setItem(LS_TOKEN, TOKEN);
      STATE = await api('getInitData'); cacheState();

function go(page) {

function goBack() {

    go(pageHistory[pageHistory.length - 1]);

// v1.4：排序函式工廠
function getSortFn(mode, today) {
  const priorityRank = p => ({ high:0, med:1, low:2 }[p||'med']);
  const score = t => (Number(t.complexity)||0) + (Number(t.techDifficulty)||0);
  const delay = t => {
    if (t.status === 'done' || t.status === 'failed' || !t.deadline) return 0;
    if (t.deadline >= today) return 0;
    return Math.round((new Date(today) - new Date(t.deadline)) / 86400000);
  };
  const smartScore = t => {
    // 智能排序：延誤天數 × 10 + 優先級反序 × 5 + 任務分數 × 1
    return delay(t) * 10 + (2 - priorityRank(t.priority)) * 5 + score(t);
  };
  switch(mode) {
    case 'deadline':
      return (a,b) => (iso(a.deadline)||'9999').localeCompare(iso(b.deadline)||'9999');
    case 'score':
      return (a,b) => score(b) - score(a);
    case 'priority':
      return (a,b) => priorityRank(a.priority) - priorityRank(b.priority);
    case 'delay':
      return (a,b) => delay(b) - delay(a);
    case 'created':
      return (a,b) => iso(b.createdAt).localeCompare(iso(a.createdAt));
    case 'smart':
    default:
      return (a,b) => smartScore(b) - smartScore(a);
  }
}

// 計算單一員工的考績摘要
function computeMemberScore(allTasks, assignee) {
  const own = allTasks.filter(t => t.assignee === assignee);
  const done   = own.filter(t => t.status === 'done');
  const failed = own.filter(t => t.status === 'failed');
  const hold   = own.filter(t => t.status === 'hold');
  const inProgress = own.filter(t => ['plan','do','check'].indexOf(t.status)>=0);

  const sum = (arr, k) => arr.reduce((s,t) => s + (Number(t[k])||0), 0);
  const pairSum = arr => arr.reduce((s,t) => s + (Number(t.complexity)||0) + (Number(t.techDifficulty)||0), 0);

  const baseScore   = pairSum(done);
  const failScore   = pairSum(failed);
  const bonusScore  = sum(own, 'bonusPoints');
  const totalScore  = baseScore - failScore + bonusScore;

  const avgComp = done.length ? (sum(done,'complexity')/done.length).toFixed(1) : '–';
  const avgTech = done.length ? (sum(done,'techDifficulty')/done.length).toFixed(1) : '–';

  return {
    name: assignee,
    totalTasks: own.length,
    done: done.length,
    failed: failed.length,
    hold: hold.length,
    inProgress: inProgress.length,
    baseScore, failScore, bonusScore, totalScore,
    avgComp, avgTech,
  };
}

// ── v2.5：客戶開發甘特圖 ──────────────────────────────
function renderGantt(m) {
  const DAY_W = 26;
  const all = (STATE.tasks?.[currentCompany]) || [];
  const items = all.filter(t => t.bizDev === 'b2b' || t.bizDev === 'b2c');

  if (!window._ganttFilter) window._ganttFilter = { biz:'all', showDone:true };
  const gf = window._ganttFilter;

  const todayStr = localDay(new Date().toISOString());

  // 日期工具：全程走字串 YYYY-MM-DD（避免 toISOString 的 UTC 坑 1／坑 9）
  const parseYmd = s => { const [y,mo,d] = s.split('-').map(Number); return new Date(y, mo-1, d); };
  const ymd = dt => { const p = n => String(n).padStart(2,'0'); return dt.getFullYear()+'-'+p(dt.getMonth()+1)+'-'+p(dt.getDate()); };
  const addDays = (s,n) => { const dt = parseYmd(s); dt.setDate(dt.getDate()+n); return ymd(dt); };
  const diffDays = (a,b) => Math.round((parseYmd(b) - parseYmd(a)) / 86400000); // b - a（日數差）

  // 每張卡時間區間：起點＝派發日；完成→定格完成日；有未到期截止→延伸到截止；否則→今天（每天自動長）
  function ganttRange(t){
    let start = localDay(t.createdAt) || t.deadline || todayStr;
    let end;
    if (t.status === 'done' && t.completedAt) end = localDay(t.completedAt);
    else if (t.deadline && t.deadline >= todayStr) end = t.deadline;
    else end = todayStr;
    if (end < start) end = start;
    return { start, end };
  }

  const withRange = items.map(t => Object.assign({ t }, ganttRange(t)));
  const b2bCount = items.filter(t => t.bizDev === 'b2b').length;
  const b2cCount = items.filter(t => t.bizDev === 'b2c').length;

  // 篩選
  let shown = withRange;
  if (gf.biz === 'b2b') shown = shown.filter(x => x.t.bizDev === 'b2b');
  if (gf.biz === 'b2c') shown = shown.filter(x => x.t.bizDev === 'b2c');

  } else { axisStart = todayStr; axisEnd = todayStr; }
  axisEnd = addDays(axisEnd, 3);
  const totalDays = diffDays(axisStart, axisEnd) + 1;

  const lastDay = addDays(axisStart, totalDays - 1);

  // 逐日欄位
  const days = [];
  for (let i=0;i<totalDays;i++) days.push(addDays(axisStart, i));

  // 月份合併表頭
  const monthSpans = [];
  days.forEach(ds => {
    const ym = ds.slice(0,7);

    if (ds===todayStr)  cls.push('today');
    return `<div class="${cls.join(' ')}">${dt.getDate()}</div>`;
  }).join('');

  // 軌道背景（周末整欄紅底 + 今日線，重複貼在每列以形成連續直帶）
  const trackBg = days.map((ds,i) => {
    const dt = parseYmd(ds), wd = dt.getDay();

    if (wd===0||wd===6) cls.push('weekend');
    if (ds===todayStr)  cls.push('today');

    </div>

}

// v1.4：計算任務時效性（done 任務才有）
function computeTimeliness(t) {
  if (t.status !== 'done') return null;
  if (!t.deadline || !t.completedAt) return null;
  const done = localDay(t.completedAt);
  if (done < t.deadline)  return { tag:'early',  icon:'🚀 提前', bg:'#DBEAFE', color:'#1F4E79' };
  if (done === t.deadline) return { tag:'ontime', icon:'⏰ 準時', bg:'#FEF3C7', color:'#BF8F00' };
  return                          { tag:'late',   icon:'🐢 延誤', bg:'#FEE2E2', color:'#991B1B' };
}

// v1.4：計算延誤天數（未完成且過了 deadline）
function computeDelay(t, today) {
  if (t.status === 'done' || t.status === 'failed') return { days:0 };
  if (!t.deadline) return { days:0 };
  if (t.deadline >= today) return { days:0 };
  const d1 = new Date(t.deadline);
  const d2 = new Date(today);
  const days = Math.round((d2 - d1) / 86400000);
  return { days };
}

// v1.4：計算建議分數（用於採用建議按鈕）
function computeSuggestedBonus(t) {
  const tm = computeTimeliness(t);
  if (!tm) return null;
  if (tm.tag === 'early')  return { points: 2,  reason: '🚀 提前完成 (+2)' };
  if (tm.tag === 'ontime') return { points: 1,  reason: '⏰ 準時完成 (+1)' };
  // 延誤：按天數加重，最多 -10
  if (tm.tag === 'late') {
    const done = new Date(localDay(t.completedAt));
    const deadline = new Date(t.deadline);
    const days = Math.round((done - deadline) / 86400000);
    const weeks = Math.ceil(days / 7);
    const points = Math.max(-10, -2 * weeks);
    return { points, reason: '🐢 延誤完成 ' + days + ' 天 (' + points + ')' };
  }
  return null;
}

// 各週期當前/選定的 periodKey（native input 值格式即 periodKey：month=2026-06、week=2026-W25、day=2026-06-25）
function periodKeyOf(period) {
  const today = localDay(new Date());
  if (period === 'month') return _goalSel.month || today.slice(0, 7);
  if (period === 'week')  return _goalSel.week  || currentWeekId(new Date());
  return _goalSel.day || today;
}
function isPeriodCurrent(period) {
  const sel = _goalSel[period];
  if (!sel) return true;
  const today = localDay(new Date());
  if (period === 'month') return sel === today.slice(0, 7);
  if (period === 'week')  return sel === currentWeekId(new Date());
  return sel === today;
}

// 以 UTC 構建純日期物件做整數日期運算，避開時區位移（僅供顯示用標籤）
function _goalDateUTC(ymd) {
  const p = String(ymd).split('-');
  return new Date(Date.UTC(+p[0], (+p[1]) - 1, +p[2]));
}
function weekdayTW(dayKey) {
  return ['日', '一', '二', '三', '四', '五', '六'][_goalDateUTC(dayKey).getUTCDay()];
}
// 從 ISO 週鍵（2026-W25）算該週週一的 UTC 日期（標準 ISO：含 1/4 的那週為第 1 週）
function isoWeekMonday(weekKey) {
  const m = String(weekKey).match(/(\d{4})-W(\d{2})/);
  if (!m) return null;
  const year = +m[1], week = +m[2];
  const jan4 = new Date(Date.UTC(year, 0, 4));
  const jan4Dow = jan4.getUTCDay() || 7;
  const w1mon = new Date(jan4); w1mon.setUTCDate(jan4.getUTCDate() - (jan4Dow - 1));
  const mon = new Date(w1mon); mon.setUTCDate(w1mon.getUTCDate() + (week - 1) * 7);
  return mon;
}
function weekRangeLabelFromKey(weekKey) {
  const mon = isoWeekMonday(weekKey);
  if (!mon) return '';
  const sun = new Date(mon); sun.setUTCDate(mon.getUTCDate() + 6);
  const md = x => (x.getUTCMonth() + 1) + '/' + x.getUTCDate();
  return md(mon) + ' – ' + md(sun);
}

// native picker 值格式即 periodKey：month→type=month、week→type=week、day→type=date
function periodPickerHtml(period, key) {
  const t = period === 'month' ? 'month' : period === 'week' ? 'week' : 'date';
  return `<input type="${t}" class="goal-date-input" value="${escapeHtml(key)}" onchange="onGoalPeriodChange('${period}', this.value)">`;
}
function periodPkLabel(period, key) {
  if (period === 'month') return key;
  if (period === 'week')  return key + '（' + weekRangeLabelFromKey(key) + '）';
  return key.slice(5).replace('-', '/') + '（' + weekdayTW(key) + '）';
}
// 日鍵 ± delta 天（UTC 整數運算、無時區位移）
function dayKeyShift(dayKey, delta) {
  const d = _goalDateUTC(dayKey); d.setUTCDate(d.getUTCDate() + delta);
  const p = n => String(n).padStart(2, '0');
  return d.getUTCFullYear() + '-' + p(d.getUTCMonth() + 1) + '-' + p(d.getUTCDate());
}
// 相對「真實今天」的中文詞（後天/明天/今天/昨天/前天），超出則空字串
function dayRelLabel(dayKey) {
  const diff = Math.round((_goalDateUTC(dayKey) - _goalDateUTC(localDay(new Date()))) / 86400000);
  return ({ '2':'後天', '1':'明天', '0':'今天', '-1':'昨天', '-2':'前天' })[String(diff)] || '';
}
function dayColHeadHtml(dayKey) {
  const rel = dayRelLabel(dayKey);
  return `${rel ? '<b>' + rel + '</b> ' : ''}${dayKey.slice(5).replace('-', '/')}（${weekdayTW(dayKey)}）`;
}
// v2.9：每日目標三欄並排（左=隔天/明天、中=錨定日/今天、右=前一天/昨天）；各欄各自一個 dayKey bucket
function renderDayColumns(anchorKey) {
  const cols = [dayKeyShift(anchorKey, 1), anchorKey, dayKeyShift(anchorKey, -1)];
  return `<div class="goal-day-grid">
    ${cols.map(dk => `
      <div class="goal-day-col">
        <div class="goal-day-col-head">${dayColHeadHtml(dk)}</div>
        ${GOAL_COMPANIES.map(co => goalCompanyBlock(co, 'day', dk)).join('')}
      </div>`).join('')}
  </div>`;
}

// 只重渲染單一週期卡（不動其他兩層）；day 卡為三欄並排（明天/今天/昨天 比對）
function renderPeriodCard(period) {
  const el = document.getElementById('goal-card-' + period);
  if (!el) return;
  const key = periodKeyOf(period);
  const meta = GOAL_PERIOD_META[period];
  const cur = isPeriodCurrent(period);
  const headPk = period === 'day' ? '明天 ｜ 今天 ｜ 昨天 比對' : escapeHtml(periodPkLabel(period, key));
  const body = period === 'day'
    ? renderDayColumns(key)
    : GOAL_COMPANIES.map(co => goalCompanyBlock(co, period, key)).join('');
  el.innerHTML = `
    <div class="goal-period-head">
      ${meta.icon} ${meta.label} <span class="pk">${headPk}</span>
      <span class="goal-card-picker">
        ${periodPickerHtml(period, key)}
        <button type="button" class="goal-mini-today" onclick="onGoalPeriodToday('${period}')" ${cur ? 'disabled' : ''}>本${period === 'month' ? '月' : period === 'week' ? '週' : '日'}</button>
      </span>
    </div>
    ${body}`;
  _goalDirty[period] = false;   // 該層剛渲染＝乾淨
}

// dirty 標記：傳入元素 → 推回所屬週期；或直接傳 period 字串
function markGoalsDirty(elOrPeriod) {
  let period = elOrPeriod;
  if (elOrPeriod && elOrPeriod.closest) {
    const b = elOrPeriod.closest('.goal-co-block');
    period = b ? b.dataset.period : null;
  }
  if (period && _goalDirty.hasOwnProperty(period)) _goalDirty[period] = true;
}
function _confirmLeavePeriod(period) {
  return !_goalDirty[period] || confirm('此區塊有未儲存的編輯，切換日期會丟失，確定？');
}
function onGoalPeriodChange(period, v) {
  if (!v) { renderPeriodCard(period); return; }          // 清空 → 還原
  if (!_confirmLeavePeriod(period)) { renderPeriodCard(period); return; }
  _goalSel[period] = v;
  renderPeriodCard(period);                              // 只重畫這一層
}
function onGoalPeriodToday(period) {
  if (!_confirmLeavePeriod(period)) return;
  _goalSel[period] = '';
  renderPeriodCard(period);
}

function goalCompanyBlock(company, period, periodKey) {
  const rows = goalsForBucket(company, period, periodKey);
  const list = rows.length ? rows : [{ content:'', done:'', assignee:'', linkedTaskId:'' }];
  const color = GOAL_CO_COLOR[company] || 'var(--primary)';
  return `
    <div class="goal-co-block" data-company="${company}" data-period="${period}" data-periodkey="${escapeHtml(periodKey)}">
      <div class="goal-co-name"><span class="co-dot" style="background:${color}"></span>${escapeHtml(COMPANY_LABEL[company] || company)}<button type="button" class="goal-btn-add goal-add-co" title="新增一列目標" onclick="addGoalRowToBlock(this)">＋</button></div>
      <div class="goal-rows">${list.map(g => goalRowHtml(company, period, g)).join('')}</div>
    </div>`;
}

function goalRowHtml(company, period, g) {
  const done = String(g.done) === '1' || g.done === true;
  const linked = g.linkedTaskId ? findTaskById(company, g.linkedTaskId) : null;
  let dayExtra = '';
  if (period === 'day') {
    dayExtra = `
      <select class="goal-emp-select" data-k="assignee" onchange="markGoalsDirty(this)">${staffOptions(company, g.assignee || '')}</select>
      <button type="button" class="goal-btn-link ${linked ? 'linked' : ''}" data-k="link" onclick="openLinkModal(this)" title="${linked ? '已掛任務卡（點可重掛）：' + escapeHtml(linked.title) : '掛任務卡（半自動）'}">${linked ? '✅' : '🔗'}</button>`;
  }
  return `
    <div class="goal-row ${done ? 'done' : ''}" data-linked="${escapeHtml(g.linkedTaskId || '')}">
      <button type="button" class="goal-done-dot ${done ? 'done' : ''}" title="標記完成 / 取消" onclick="toggleGoalDone(this)"></button>
      <input class="goal-input" data-k="content" value="${escapeHtml(g.content || '')}" placeholder="請 key 目標內容…" oninput="markGoalsDirty(this)">${dayExtra}
      <button type="button" class="goal-btn-del" title="刪除此列" onclick="delGoalRow(this)">−</button>
    </div>`;
}

function toggleGoalDone(btn) {
  btn.classList.toggle('done');
  btn.closest('.goal-row').classList.toggle('done');
  markGoalsDirty(btn);
}
// v2.9：每間公司一顆「＋」（在公司名旁），按下在該公司目標列末尾新增一列
function addGoalRowToBlock(btn) {
  const block = btn.closest('.goal-co-block');
  const rows = block.querySelector('.goal-rows');
  const tmp = document.createElement('div');
  tmp.innerHTML = goalRowHtml(block.dataset.company, block.dataset.period, { content:'', done:'', assignee:'', linkedTaskId:'' });
  rows.appendChild(tmp.querySelector('.goal-row'));
  markGoalsDirty(btn);
}
function delGoalRow(btn) {
  const row = btn.closest('.goal-row');
  const rows = row.parentElement;
  markGoalsDirty(btn);
  if (rows.children.length > 1) { row.remove(); return; }
  // 至少保留 1 列：清空而非刪除
  row.querySelector('[data-k="content"]').value = '';
  row.dataset.linked = '';
  row.classList.remove('done');
  const dot = row.querySelector('.goal-done-dot'); if (dot) dot.classList.remove('done');
  const lk = row.querySelector('[data-k="link"]'); if (lk) { lk.classList.remove('linked'); lk.textContent = '🔗'; lk.title = '掛任務卡（半自動）'; }
}

// 蒐集畫面上 9 個 bucket（3 公司 × 3 週期）非空列 → saveGoals（整桶取代）
// periodKey 取各 block 自帶的 data-periodkey（三層各自挑日期，不可共用 goalKeys）
async function saveGoals() {
  const buckets = [];
  document.querySelectorAll('.goal-co-block').forEach(block => {
    const company = block.dataset.company;
    const period = block.dataset.period;
    const periodKey = block.dataset.periodkey;
    const items = [];
    block.querySelectorAll('.goal-row').forEach((row, i) => {
      const content = (row.querySelector('[data-k="content"]') || {}).value || '';
      if (!content.trim()) return;
      items.push({
        content: content.trim(),
        done: row.classList.contains('done'),
        assignee: period === 'day' ? ((row.querySelector('[data-k="assignee"]') || {}).value || '') : '',
        sortOrder: i,
        linkedTaskId: row.dataset.linked || '',
      });
    });
    buckets.push({ company, period, periodKey, items });
  });
  try {
    await api('saveGoals', { buckets });
    STATE = await api('getInitData'); cacheState();
    showToast('目標已儲存', 'success');
    go('goals');
  } catch (e) { showToast(e.message, 'error'); }
}

// ── 每日目標「連動掛任務卡」半自動（⭐ 建議 → 子任務 / ⚡ 機動卡，零新增端點） ──
let _linkCtx = null;   // { row, company, content, emp }
const _GOAL_STATUS_ZH = { plan:'📋 規劃', do:'🏃 執行', check:'🔍 檢查', done:'✅ 完成', hold:'⏸ 暫停', failed:'❌ 失敗' };
const _GOAL_TYPE_ZH   = { normal:'一般', adhoc:'⚡ 機動', project:'📦 專案', subtask:'↳ 子任務' };

// 中文 bigram（連續兩字）相似度：命中數為分數（輕量、前端）
function bigrams(s) {
  s = String(s || '').replace(/\s+/g, '');
  const set = new Set();
  for (let i = 0; i < s.length - 1; i++) set.add(s.slice(i, i + 2));
  return set;
}
function bigramScore(goalSet, text) {
  if (!goalSet.size) return 0;
  const t = String(text || '').replace(/\s+/g, '');
  let hit = 0;
  goalSet.forEach(bg => { if (t.indexOf(bg) >= 0) hit++; });
  return hit;
}

function openLinkModal(btn) {
  const row = btn.closest('.goal-row');
  const block = btn.closest('.goal-co-block');
  const company = block.dataset.company;
  const content = ((row.querySelector('[data-k="content"]') || {}).value || '').trim();
  const emp = (row.querySelector('[data-k="assignee"]') || {}).value || '';
  if (!content || !emp) { showToast('請先填目標內容並選定負責員工', 'warn'); return; }
  _linkCtx = { row, company, content, emp };
  const existingLinked = row.dataset.linked || '';

  // 候選＝該員工在該公司「進行中、非子任務」的卡（排除已是子任務的卡，避免子任務再掛子任務）
  const cands = ((STATE.tasks && STATE.tasks[company]) || []).filter(t =>
    t.assignee === emp && t.status !== 'done' && t.status !== 'failed' && !t.parentTaskId);
  const goalBg = bigrams(content);
  const scored = cands
    .map(t => ({ t, score: bigramScore(goalBg, (t.title || '') + ' ' + (t.why || '') + ' ' + (t.doneLook || '')) }))
    .sort((a, b) => b.score - a.score);
  const bestId = (scored.length && scored[0].score > 0) ? scored[0].t.id : '';

  const candHtml = scored.length ? scored.map(({ t, score }) => `
    <div class="goal-cand ${t.id === bestId ? 'suggest' : ''}">
      <div class="ttl">${t.id === bestId ? '⭐ 建議　' : ''}${escapeHtml(t.title)}
        <div class="meta">${_GOAL_STATUS_ZH[t.status] || escapeHtml(t.status || '')} ・ ${_GOAL_TYPE_ZH[t.taskType] || escapeHtml(t.taskType || '')}${score > 0 ? ' ・ 相似度 ' + score : ''}</div>
      </div>
      <button class="btn btn-ghost" onclick="linkAsSubtask('${escapeHtml(t.id)}')">掛成子任務</button>
    </div>`).join('')
    : `<p class="page-sub">「${escapeHtml(emp)}」目前沒有進行中的任務卡，可直接新建機動卡。</p>`;

  showModal({
    title: '🔗 連動掛任務卡',
    body: `
      <p class="page-sub" style="margin-bottom:12px;">目標：<b>${escapeHtml(content)}</b> ・ 負責：<b>${escapeHtml(emp)}</b>（${escapeHtml(COMPANY_LABEL[company] || company)}）</p>
      ${existingLinked ? `<div style="background:#fffbe6;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:12.5px;color:#92600a;margin-bottom:12px;">此目標已掛過任務卡，再選一張會建立新卡（舊卡不會自動刪除，如需移除請到看板手動處理）。</div>` : ''}
      <div>${candHtml}</div>`,
    foot: `
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="linkAsAdhoc()">⚡ 都不相關 → 新建機動卡</button>`,
  });
}

// 比照 openTaskModal 的預設 data 物件（避免缺欄位）；勿手動塞 id/createdAt（後端產生）
function makeBlankTask(company) {
  const me = STATE.me;
  return {
    id:'', title:'', why:'', doneLook:'', redLines:'',
    deadline:'', midCheck:'',
    assignee:'', creator: me.username,
    priority:'med', authLevel:'L2', status:'plan',
    complexity:0, techDifficulty:0, bonusPoints:0, bonusReason:'',
    parentTaskId:'', isParent:false, projectKPI:'',
    taskType:'normal', attachments:[], statusHistory:[],
    bizDev:'', collaborators:[],
    company: company,
    createdAt:'', notes:[],
  };
}
async function linkAsAdhoc() {
  if (!_linkCtx) return;
  const { company, content, emp } = _linkCtx;
  const task = makeBlankTask(company);
  task.title = content; task.assignee = emp; task.taskType = 'adhoc';
  task.status = 'plan'; task.creator = STATE.me.username;
  await _doLinkSave(task, '機動卡 ⚡');
}
async function linkAsSubtask(parentId) {
  if (!_linkCtx) return;
  const { company, content, emp } = _linkCtx;
  const task = makeBlankTask(company);
  task.title = content; task.assignee = emp; task.parentTaskId = parentId;  // 後端自動推 taskType='subtask'
  task.status = 'plan'; task.creator = STATE.me.username;
  await _doLinkSave(task, '子任務');
}
async function _doLinkSave(task, kindLabel) {
  try {
    const res = await api('saveTask', { task });   // 回傳 { task }
    const newTask = res.task;
    if (!STATE.tasks[task.company]) STATE.tasks[task.company] = [];
    STATE.tasks[task.company].push(newTask);
    // 把該 goal 列的 linkedTaskId 設為新卡 id
    if (_linkCtx && _linkCtx.row) _linkCtx.row.dataset.linked = newTask.id;
    closeModal();
    showToast('已掛上『' + kindLabel + '』：' + _gTrunc(task.title, 12), 'success');
    await saveGoals();   // 持久化 goals（含 linkedTaskId）並重抓 STATE 重渲染
  } catch (e) { showToast(e.message, 'error'); }
}

async function saveTask(id) {
  const get = sel => { const el = document.getElementById(sel); return el ? el.value.trim() : ''; };
  const title = get('f-title');
  if (!title) { showToast('任務名稱必填','error'); return; }
  // v2.1：新進度回報結構（plan/effect/needFix 三欄）
  const notePlan    = get('f-note-plan');
  const noteEffect  = get('f-note-effect');
  const noteNeedFix = get('f-note-needfix');
  const newNote     = notePlan; // 至少要有執行計畫才算一筆
  const task = {
    id: id || '',
    company: currentCompany,
    title,
    why:        get('f-why'),
    doneLook:   get('f-done'),
    redLines:   get('f-red'),
    deadline:   get('f-deadline'),
    midCheck:   get('f-mid'),
    assignee:   get('f-assignee'),
    priority:   get('f-priority'),
    authLevel:  get('f-auth'),
    status:     get('f-status'),
  };
  // 評分欄位（僅 admin/lord 看得到欄位，後端也會做雙重防禦）
  if (document.getElementById('f-complexity')) {
    task.complexity     = Number(get('f-complexity')) || 0;
    task.techDifficulty = Number(get('f-techDifficulty')) || 0;
    task.bonusPoints    = Number(get('f-bonusPoints')) || 0;
    task.bonusReason    = get('f-bonusReason');
  }
  // v2.2：父子任務 — 從 radio 推斷層級
  const relEl = document.querySelector('input[name="f-rel"]:checked');
  const rel = relEl ? relEl.value : 'standalone';
  if (rel === 'parent') {
    task.isParent     = true;
    task.parentTaskId = '';
    task.projectKPI   = get('f-projectKPI');
  } else if (rel === 'child') {
    const pid = get('f-parent');
    if (!pid) { showToast('請選擇歸屬的父任務','error'); return; }
    task.parentTaskId = pid;
    task.isParent     = false;
    task.projectKPI   = '';
  } else {
    task.parentTaskId = '';
    task.isParent     = false;
    task.projectKPI   = '';
  }
  // v1.6：任務類型 + 附檔
  const tt = document.querySelector('input[name="f-taskType"]:checked');
  if (tt) task.taskType = tt.value;
  // v2.5：客戶開發分類
  const bd = document.querySelector('input[name="f-bizDev"]:checked');
  task.bizDev = bd ? bd.value : '';
  // v1.7：協作人員
  task.collaborators = Array.from(document.querySelectorAll('input[name="f-collaborator"]:checked')).map(c => c.value);
  // 父任務 / 子任務的 type 由後端自動推斷，前端無需強制
  if (task.parentTaskId) task.taskType = 'subtask';
  if (task.isParent || task.projectKPI) task.taskType = 'project';
  // 附檔資料（在 step 3 補上）
  if (window._pendingAttachments) {
    task.attachments = window._pendingAttachments;
  }
  if (newNote) task.notes = [{ at:new Date().toISOString(), by:STATE.me.username, plan:notePlan, effect:noteEffect, needFix:noteNeedFix }];

  try {
    await api('saveTask', { task });
    STATE = await api('getInitData'); cacheState();
    closeModal();
    go('kanban');
    showToast(id?'已儲存':'已建立任務','success');
  } catch (e) {
    showToast(e.message,'error');
  }
}
async function deleteTask(id) {
  if (!confirm('確定刪除此任務？無法復原。')) return;
  try {
    await api('deleteTask', { company: currentCompany, taskId: id });
    STATE = await api('getInitData'); cacheState();
    closeModal();
    go('kanban');
    showToast('已刪除','warn');
  } catch (e) {
    showToast(e.message,'error');
  }
}

function reportField(id, num, label, val, color, hint, type='area') {
  return `
    <div class="report-section">
      <div class="report-section-head">
        <span class="report-icon" style="background:${color};">${num}</span>
        <span class="report-section-title">${label}</span>
      </div>
      ${type==='input'
        ? `<input class="field-input" id="r-${id}" value="${escapeHtml(val)}" placeholder="${hint}">`
        : `<textarea class="field-textarea" id="r-${id}" placeholder="${hint}">${escapeHtml(val)}</textarea>`}
    </div>
  `;
}
async function saveReport(withOneOnOne) {
  const wk = currentWeekId();
  const me = STATE.me;
  // v2.1：新三欄優先，舊三欄保留向後相容
  const getVal = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const report = {
    company: currentCompany,
    weekId: wk,
    username: me.username,
    // v2.1 新三欄（對齊進度回報結構）
    planText:    getVal('r-plan'),
    effectText:  getVal('r-effect'),
    needFixText: getVal('r-needFix'),
    // v1 舊三欄（向後相容）
    done:        getVal('r-done'),
    blocking:    getVal('r-block'),
    nextWeek:    getVal('r-next'),
    ownDecisions:getVal('r-decide'),
    mood:        getVal('r-mood'),
  };
  if (withOneOnOne) {
    report.oneOnOne = {
      proudJudgment:     document.getElementById('r-q1').value.trim(),
      uncertainDecision: document.getElementById('r-q2').value.trim(),
      upcomingJudgments: document.getElementById('r-q3').value.trim(),
    };
  }
  try {
    await api('saveReport', { report });
    STATE = await api('getInitData'); cacheState();
    showToast('週報已儲存','success');
    go('report');
  } catch (e) {
    showToast(e.message,'error');
  }
}
